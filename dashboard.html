function toggleSescoEdit(key){
  const content = document.getElementById(`sesco-${key}-content`);
  const btn = document.getElementById(`sesco-${key}-edit-btn`);
  if(!content || !btn) return;
  const isEditing = content.classList.contains('sesco-edit-mode');
  if(isEditing){
    // 저장
    btn.textContent = '💾 저장 중...';
    btn.disabled = true;
    content.classList.remove('sesco-edit-mode');
    content.querySelectorAll('td').forEach(td => td.contentEditable = 'false');
    saveSescoHtml(key, content.innerHTML).then(()=>{
      btn.textContent = '✏️ 편집';
      btn.classList.remove('saving');
      btn.disabled = false;
    });
  } else {
    // 편집 모드
    content.classList.add('sesco-edit-mode');
    content.querySelectorAll('td').forEach(td => td.contentEditable = 'true');
    btn.textContent = '✅ 완료';
    btn.classList.add('saving');
  }
}

// ── SESCO 다중 셀 선택 ────────────────────────────────────────────
let _selCells = new Set();
let _dragStartCell = null;
let _isDragging = false;

function clearSelCells(hideBar = true){
  _selCells.forEach(td => td.classList.remove('sesco-cell-sel'));
  _selCells.clear();
  _dragStartCell = null;
  if(hideBar) hideSescoToolbar();
}

function toggleSelCell(td){
  if(_selCells.has(td)){ td.classList.remove('sesco-cell-sel'); _selCells.delete(td); }
  else { td.classList.add('sesco-cell-sel'); _selCells.add(td); }
}

function expandSelToCell(td, table){
  // clear prev drag sel then fill rectangle between _dragStartCell and td
  _selCells.forEach(c => c.classList.remove('sesco-cell-sel'));
  _selCells.clear();
  const allCells = Array.from(table.querySelectorAll('td, th'));
  const si = allCells.indexOf(_dragStartCell), ei = allCells.indexOf(td);
  if(si < 0 || ei < 0) return;
  const lo = Math.min(si,ei), hi = Math.max(si,ei);
  for(let i=lo; i<=hi; i++){ allCells[i].classList.add('sesco-cell-sel'); _selCells.add(allCells[i]); }
}

function showToolbarForCells(){
  if(_selCells.size === 0) return;
  const rect = [..._selCells][0].getBoundingClientRect();
  showSescoToolbar(rect.left + rect.width/2 - 200, rect.top + window.scrollY);
}

function addCellSelectionListeners(table){
  const content = table.closest('[id^="sesco-"][id$="-content"]');
  if(!content) return;

  table.addEventListener('mousedown', e=>{
    if(!content.classList.contains('sesco-edit-mode')) return;
    const td = e.target.closest('td, th');
    if(!td) return;
    if(e.ctrlKey || e.metaKey){
      e.preventDefault();
      toggleSelCell(td);
      if(_selCells.size > 0) showToolbarForCells();
      else hideSescoToolbar();
    } else {
      // normal click: clear multi-sel, allow text editing
      if(_selCells.size > 0){ clearSelCells(true); }
      _dragStartCell = td;
      _isDragging = false;
    }
  });

  table.addEventListener('mousemove', e=>{
    if(!(e.buttons & 1) || !_dragStartCell) return;
    if(!content.classList.contains('sesco-edit-mode')) return;
    const td = e.target.closest('td, th');
    if(!td || td === _dragStartCell) return;
    _isDragging = true;
    e.preventDefault();
    expandSelToCell(td, table);
    if(_selCells.size > 0) showToolbarForCells();
  });

  table.addEventListener('mouseup', e=>{
    if(_isDragging && _selCells.size > 0) showToolbarForCells();
    _isDragging = false;
  });
}

// ── 다중 셀에 서식 적용 헬퍼 ─────────────────────────────────────
function applyToSelCells(fn){
  _selCells.forEach(fn);
  // keep toolbar & selection visible after applying
  showToolbarForCells();
}

// ── SESCO 행/열 숨기기 ────────────────────────────────────────────
const _sescoHidden = new WeakMap();
function _getHidden(t){ if(!_sescoHidden.has(t)) _sescoHidden.set(t,{rows:new Set(),cols:new Set()}); return _sescoHidden.get(t); }

let _ctxTable=null, _ctxTr=null, _ctxColIdx=-1;

function openSescoCtx(e, table){
  e.preventDefault(); e.stopPropagation();
  _ctxTable = table;
  _ctxTr = e.target.closest('tr');
  const cell = e.target.closest('td,th');
  _ctxColIdx = cell ? cell.cellIndex : -1;
  const isBody = _ctxTr && !!_ctxTr.closest('tbody');
  const isHead = cell && cell.tagName==='TH';
  const h = _getHidden(table);
  const menu = document.getElementById('sesco-ctx-menu');
  document.getElementById('ctx-hide-row').style.display = isBody ? '' : 'none';
  document.getElementById('ctx-hide-col').style.display = isHead ? '' : 'none';
  document.getElementById('ctx-restore-all').style.display = (h.rows.size||h.cols.size) ? '' : 'none';
  // 아무것도 표시할 항목이 없으면 메뉴 열지 않음
  if(!isBody && !isHead && !(h.rows.size||h.cols.size)) return;
  menu.style.left = Math.min(e.clientX, window.innerWidth-180)+'px';
  menu.style.top  = Math.min(e.clientY, window.innerHeight-120)+'px';
  menu.style.display = 'block';
}

document.addEventListener('click', ()=> document.getElementById('sesco-ctx-menu').style.display='none', true);
document.addEventListener('contextmenu', e=>{ if(!e.target.closest('#sesco-ctx-menu')) document.getElementById('sesco-ctx-menu').style.display='none'; }, true);

document.getElementById('ctx-hide-row').addEventListener('click', ()=>{
  if(!_ctxTr||!_ctxTable) return;
  _ctxTr.style.display='none';
  _getHidden(_ctxTable).rows.add(_ctxTr);
});

document.getElementById('ctx-hide-col').addEventListener('click', ()=>{
  if(_ctxColIdx<0||!_ctxTable) return;
  const h = _getHidden(_ctxTable);
  h.cols.add(_ctxColIdx);
  // colgroup col 으로 컬럼 숨김 (colspan/rowspan 대응)
  const cols = _ctxTable.querySelectorAll('colgroup col');
  if(cols[_ctxColIdx]) cols[_ctxColIdx].style.visibility='collapse';
  // th 도 숨김 (colgroup collapse가 thead에 미적용되는 브라우저 대응)
  const ths = [..._ctxTable.querySelectorAll('thead tr:first-child th, tr:first-child th')];
  if(ths[_ctxColIdx]) ths[_ctxColIdx].style.display='none';
});

document.getElementById('ctx-restore-all').addEventListener('click', ()=>{
  if(!_ctxTable) return;
  const h = _getHidden(_ctxTable);
  h.rows.forEach(tr=>tr.style.display='');
  h.rows.clear();
  h.cols.forEach(ci=>{
    const cols = _ctxTable.querySelectorAll('colgroup col');
    if(cols[ci]) cols[ci].style.visibility='';
    const ths = [..._ctxTable.querySelectorAll('thead tr:first-child th, tr:first-child th')];
    if(ths[ci]) ths[ci].style.display='';
  });
  h.cols.clear();
});

// ── SESCO 컬럼 리사이즈 ───────────────────────────────────────────
function makeSescoTableResizable(table){
  if(!table) return;
  table.classList.add('sesco-resizable');
  const ths = Array.from(table.querySelectorAll('thead tr:first-child th, tr:first-child th'));
  if(!ths.length) return;
  // 1) colgroup 생성 (열 숨기기에 사용)
  let cg = table.querySelector('colgroup');
  if(!cg){ cg=document.createElement('colgroup'); table.prepend(cg); }
  cg.innerHTML = Array(ths.length).fill('<col>').join('');
  // 2) 자연 너비 고정 후 fixed layout
  ths.forEach(th=>{ th.style.width = th.offsetWidth + 'px'; });
  table.style.tableLayout = 'fixed';
  // 3) 필터 초기화 (th.innerHTML 복사 — 이 시점에 핸들이 없어야 이벤트 보존)
  initSescoFilters(table);
  addCellSelectionListeners(table);
  // 4) 우클릭 메뉴 (열/행 숨기기)
  table.addEventListener('contextmenu', e=>openSescoCtx(e, table));
  // 3) 핸들은 필터 이후 추가 (이벤트 소실 방지)
  ths.forEach(th=>{
    th.querySelector('.col-resize-handle')?.remove();
    const handle = document.createElement('div');
    handle.className = 'col-resize-handle';
    th.appendChild(handle);
    handle.addEventListener('mousedown', e=>{
      e.preventDefault();
      const startX = e.clientX, startW = th.offsetWidth;
      handle.classList.add('dragging');
      const onMove = e=>{
        const w = Math.max(30, startW + e.clientX - startX);
        th.style.width = w + 'px';
        th.style.minWidth = w + 'px';
      };
      const onUp = ()=>{
        handle.classList.remove('dragging');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

// ── SESCO 컬럼 필터 ───────────────────────────────────────────────
const sescoFilters = new WeakMap();
let _fdd = null, _fTable = null, _fCol = null;

function buildCellMatrix(table){
  const rows = Array.from(table.querySelectorAll('tbody tr'));
  const mat = [];
  rows.forEach((tr, ri)=>{
    if(!mat[ri]) mat[ri]=[];
    let ci=0;
    Array.from(tr.children).forEach(td=>{
      while(mat[ri][ci]) ci++;
      const rs=parseInt(td.getAttribute('rowspan')||1);
      const cs=parseInt(td.getAttribute('colspan')||1);
      for(let r=0;r<rs;r++) for(let c=0;c<cs;c++){
        if(!mat[ri+r]) mat[ri+r]=[];
        mat[ri+r][ci+c]=td;
      }
      ci+=cs;
    });
  });
  return mat;
}

function initSescoFilters(table){
  if(!sescoFilters.has(table)) sescoFilters.set(table, new Map());
  const ths = Array.from(table.querySelectorAll('thead tr:first-child th, tr:first-child th'));
  ths.forEach((th, i)=>{
    th.querySelector('.th-filter-btn')?.remove();
    // Wrap existing content in th-inner if not already
    if(!th.querySelector('.th-inner')){
      const inner = document.createElement('span');
      inner.className='th-inner';
      inner.innerHTML = th.innerHTML;
      th.innerHTML='';
      th.appendChild(inner);
    }
    const btn = document.createElement('span');
    btn.className='th-filter-btn';
    btn.textContent='▼';
    btn.title='필터';
    btn.addEventListener('click', e=>{ e.stopPropagation(); openFilterDd(table,i,btn); });
    th.querySelector('.th-inner').appendChild(btn);
  });
}

function openFilterDd(table, colIdx, anchorEl){
  closeFilterDd();
  _fTable=table; _fCol=colIdx;
  const filters = sescoFilters.get(table);
  const active = filters.get(colIdx);
  const mat = buildCellMatrix(table);
  const rows = Array.from(table.querySelectorAll('tbody tr'));

  // collect unique values
  const allVals = new Set();
  mat.forEach(row=>{ const td=row[colIdx]; if(td) allVals.add(td.textContent.trim()); });
  const sortedVals = [...allVals].sort((a,b)=>a.localeCompare(b,'ko'));

  const dd = document.createElement('div');
  dd.id='col-filter-dd';

  // search box
  const search = document.createElement('input');
  search.className='filter-search'; search.placeholder='검색...'; search.type='text';
  dd.appendChild(search);

  // head buttons
  const head = document.createElement('div');
  head.className='filter-dd-head';
  const allBtn = document.createElement('button'); allBtn.textContent='전체 선택';
  const noneBtn = document.createElement('button'); noneBtn.textContent='전체 해제';
  head.appendChild(allBtn); head.appendChild(noneBtn);
  dd.appendChild(head);
  dd.appendChild(Object.assign(document.createElement('div'),{className:'filter-sep'}));

  const optWrap = document.createElement('div');
  dd.appendChild(optWrap);

  function renderOpts(filter){
    optWrap.innerHTML='';
    sortedVals.filter(v=>v.toLowerCase().includes(filter.toLowerCase())).forEach(val=>{
      const lbl = document.createElement('label');
      lbl.className='filter-option';
      const cb = document.createElement('input'); cb.type='checkbox'; cb.value=val;
      cb.checked = !active || active.has(val);
      cb.addEventListener('change',()=>{
        let set = filters.get(colIdx);
        if(!set){ set=new Set(allVals); filters.set(colIdx,set); }
        cb.checked ? set.add(val) : set.delete(val);
        if(set.size===allVals.size) filters.delete(colIdx);
        applySescoFilter(table, mat, rows);
        updateFilterBtns(table);
      });
      const sp = document.createElement('span');
      sp.textContent = val||'(빈값)';
      lbl.appendChild(cb); lbl.appendChild(sp);
      optWrap.appendChild(lbl);
    });
  }
  renderOpts('');

  search.addEventListener('input', ()=>renderOpts(search.value));
  allBtn.addEventListener('click', ()=>{
    filters.delete(colIdx);
    applySescoFilter(table, mat, rows);
    updateFilterBtns(table);
    closeFilterDd();
  });
  noneBtn.addEventListener('click', ()=>{
    filters.set(colIdx, new Set());
    applySescoFilter(table, mat, rows);
    updateFilterBtns(table);
    optWrap.querySelectorAll('input[type=checkbox]').forEach(cb=>cb.checked=false);
  });

  document.body.appendChild(dd);
  _fdd=dd;
  const rect=anchorEl.getBoundingClientRect();
  dd.style.left = Math.min(rect.left, window.innerWidth-250)+'px';
  dd.style.top  = (rect.bottom+4)+'px';
  search.focus();
}

function applySescoFilter(table, mat, rows){
  const filters = sescoFilters.get(table);
  rows.forEach((tr,ri)=>{
    let show=true;
    filters.forEach((allowedSet,ci)=>{
      if(!show) return;
      const td = mat[ri]?.[ci];
      const val = td ? td.textContent.trim() : '';
      if(!allowedSet.has(val)) show=false;
    });
    tr.style.display=show?'':'none';
  });
}

// ── SESCO 서식 툴바 ───────────────────────────────────────────────
let _sescoSavedRange = null;

function sescoFmt(cmd){
  if(_selCells.size > 0){
    const toggle = {bold:['fontWeight','bold',''],italic:['fontStyle','italic',''],underline:['textDecoration','underline','']};
    const t = toggle[cmd];
    if(t){
      const allBold = [..._selCells].every(td=>td.style[t[0]]===t[1]);
      applyToSelCells(td=>{ td.style[t[0]] = allBold ? t[2] : t[1]; });
    } else if(cmd==='removeFormat'){
      applyToSelCells(td=>{
        ['fontWeight','fontStyle','textDecoration','color','backgroundColor','fontSize'].forEach(p=>td.style[p]='');
      });
    }
    return;
  }
  restoreSescoRange();
  document.execCommand(cmd, false, null);
  hideSescoToolbar();
}

function sescoAlign(align){
  if(_selCells.size > 0){ applyToSelCells(td=>{ td.style.textAlign = align; }); return; }
  restoreSescoRange();
  const sel = window.getSelection();
  if(!sel || sel.rangeCount===0){ hideSescoToolbar(); return; }
  let node = sel.getRangeAt(0).commonAncestorContainer;
  while(node && node.nodeName!=='TD' && node.nodeName!=='TH' && node !== document.body)
    node = node.parentNode;
  if(node && (node.nodeName==='TD'||node.nodeName==='TH')) node.style.textAlign = align;
  hideSescoToolbar();
}

function sescoFontSize(size){
  if(!size) return;
  if(_selCells.size > 0){ applyToSelCells(td=>{ td.style.fontSize = size; }); return; }
  restoreSescoRange();
  const sel = window.getSelection();
  if(!sel || sel.rangeCount===0){ hideSescoToolbar(); return; }
  const range = sel.getRangeAt(0);
  if(range.collapsed){ hideSescoToolbar(); return; }
  const span = document.createElement('span');
  span.style.fontSize = size;
  try {
    const frag = range.extractContents();
    span.appendChild(frag);
    range.insertNode(span);
    const newRange = document.createRange();
    newRange.selectNodeContents(span);
    sel.removeAllRanges();
    sel.addRange(newRange);
  } catch(e) {
    document.execCommand('fontSize', false, '7');
    const content = document.querySelector('.sesco-edit-mode');
    if(content) content.querySelectorAll('font[size="7"]').forEach(el=>{
      el.removeAttribute('size'); el.style.fontSize = size;
    });
  }
  hideSescoToolbar();
}

function sescoHighlight(color){
  if(_selCells.size > 0){
    const bg = color==='transparent' ? '' : color;
    applyToSelCells(td=>{ td.style.backgroundColor = bg; });
    return;
  }
  restoreSescoRange();
  if(color==='transparent'){
    document.execCommand('hiliteColor', false, 'transparent');
    document.execCommand('backColor', false, 'transparent');
  } else {
    document.execCommand('hiliteColor', false, color);
  }
  hideSescoToolbar();
}

function sescoColor(color){
  if(_selCells.size > 0){
    const c = color || getComputedStyle(document.documentElement).getPropertyValue('--text').trim();
    applyToSelCells(td=>{ td.style.color = c; });
    return;
  }
  restoreSescoRange();
  if(color===''){
    document.execCommand('removeFormat', false, null);
  } else {
    document.execCommand('foreColor', false, color);
  }
  hideSescoToolbar();
}

function restoreSescoRange(){
  if(!_sescoSavedRange) return;
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(_sescoSavedRange);
}

function hideSescoToolbar(){
  document.getElementById('sesco-fmt-toolbar').classList.remove('visible');
  _sescoSavedRange = null;
}

function showSescoToolbar(x, y){
  const tb = document.getElementById('sesco-fmt-toolbar');
  tb.style.left = Math.min(Math.max(4, x), window.innerWidth - 420) + 'px';
  tb.style.top  = Math.max(10, y - window.scrollY - 44) + 'px';
  tb.classList.add('visible');
  // 기본색 스와치를 현재 테마 텍스트 색으로 업데이트
  const sw = document.getElementById('fmt-color-default');
  if(sw) sw.style.background = getComputedStyle(document.documentElement).getPropertyValue('--text').trim();
}

// 편집 모드에서 텍스트 선택 시 툴바 표시
document.addEventListener('mouseup', e=>{
  const tb = document.getElementById('sesco-fmt-toolbar');
  if(tb.contains(e.target)) return; // 툴바 클릭은 무시
  const content = e.target.closest('[id^="sesco-"][id$="-content"]');
  if(content && content.classList.contains('sesco-edit-mode')){
    setTimeout(()=>{
      const sel = window.getSelection();
      if(sel && sel.toString().trim().length > 0){
        const range = sel.getRangeAt(0);
        _sescoSavedRange = range.cloneRange();
        const rect = range.getBoundingClientRect();
        showSescoToolbar(rect.left + rect.width/2 - 160, rect.top + window.scrollY);
      } else {
        hideSescoToolbar();
      }
    }, 10);
  } else {
    hideSescoToolbar();
  }
});

async function loadComm(){
  let items = await db.getByIndex('communications','projectId',PROJECT_ID);
  items.sort((a,b)=>b.date.localeCompare(a.date));
  if(commSearch){
    const q = commSearch.toLowerCase();
    items = items.filter(i=>
      (i.content||'').toLowerCase().includes(q)||
      (i.participants||'').toLowerCase().includes(q)||
      (i.actionItems||'').toLowerCase().includes(q)
    );
  }
  const el = document.getElementById('comm-list');
  if(!el) return;
  if(!items.length){
    el.innerHTML = `<div class="empty-state"><p>커뮤니케이션 기록이 없습니다</p><span>+ 버튼으로 첫 기록을 추가해보세요</span></div>`;
    return;
  }
  if(commView === 'timeline'){
    renderCommTimeline(items, el);
  } else {
    renderCommCards(items, el);
  }
}

function renderCommCards(items, el){
  el.innerHTML = items.map(c=>{
    const m = COMM_TYPE_META[c.type]||{cls:'',icon:''};
    return `
    <div class="comm-card ct-colored ${m.cls}${selectedItem?.id===c.id?' card-selected':''}">
      <div class="comm-card-header thread-trigger" data-thread-id="${c.id}" data-thread-type="comm">
        <span class="comm-date">${esc(c.date)}</span>
        <span class="comm-type-badge ct-colored ${m.cls}">${m.icon} ${esc(c.type)}</span>
        <span class="comm-participants">${esc(c.participants)}</span>
        <div class="card-actions">
          <button onclick="showCommModal('${c.id}')" title="수정">✏️</button>
          <button onclick="deleteComm('${c.id}')" title="삭제">🗑️</button>
        </div>
      </div>
      <div class="comm-card-body">
        <div class="note-rendered">${renderMarkdown(c.content)}</div>
      </div>
    </div>`;
  }).join('');
}

function renderCommTimeline(items, el){
  const rows = items.map((c, idx)=>{
    const m = COMM_TYPE_META[c.type]||{cls:'ct-email',icon:'📧'};
    const dateParts = c.date.split('-');
    const dateLabel = dateParts.length===3 ? `${dateParts[1]}/${dateParts[2]}` : c.date;
    const yearLabel = dateParts[0]||'';
    const isFirst = idx===0;
    const isLast = idx===items.length-1;
    const preview = (c.content||'').replace(/^#+\s/gm,'').replace(/\*\*/g,'').replace(/\*/g,'').replace(/`/g,'').replace(/\n/g,' ').trim().slice(0,120);
    return `
    <div class="tl-item ${m.cls}">
      <div class="tl-date-col">
        ${isFirst||dateParts[0]!==items[idx-1]?.date.split('-')[0]?`<div style="font-size:10px;color:var(--text3);margin-bottom:2px">${yearLabel}</div>`:''}
        ${dateLabel}
      </div>
      <div class="tl-line-col">
        ${isFirst?'':'<div class="tl-line"></div>'}
        <div class="tl-dot"></div>
        ${isLast?'':'<div class="tl-line"></div>'}
      </div>
      <div class="tl-card-col">
        <div class="tl-card ${m.cls}${selectedItem?.id===c.id?' card-selected':''}" data-thread-id="${c.id}" data-thread-type="comm">
          <div class="tl-card-header">
            <span class="comm-type-badge ct-colored ${m.cls}">${m.icon} ${esc(c.type)}</span>
            <span style="font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.participants)}</span>
            <div class="card-actions">
              <button onclick="showCommModal('${c.id}')" title="수정">✏️</button>
              <button onclick="deleteComm('${c.id}')" title="삭제">🗑️</button>
            </div>
          </div>
          <div class="tl-card-body">
            <div class="tl-preview">${esc(preview)}</div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
  el.innerHTML = `<div class="timeline">${rows}</div>`;
}

  zone.addEventListener('dragleave',()=>zone.classList.remove('drag-over'));

async function handleFileUpload(fileList){
  if(!fileList?.length) return;
  showUploadModal(Array.from(fileList));
}

async function showUploadModal(files){
  const catOptions = FILE_CATS.map(c=>`<option>${esc(c)}</option>`).join('');
  showModal('파일 업로드', `
    <div class="form-row">
      <label>파일 (${files.length}개)</label>
      <div>${files.map(f=>`
        <div class="upload-preview">
          <span>${fileIcon(f.type)}</span>
          <span class="file-name-preview">${esc(f.name)}</span>
          <span class="file-size-preview">${fmtSize(f.size)}</span>
        </div>
      `).join('')}</div>
    </div>
    <div class="form-row">
      <label>카테고리</label>
      <select id="f-file-cat">${catOptions}</select>
    </div>
  `,[
    {label:'업로드', cls:'btn-primary', action: async()=>{
      const cat = document.getElementById('f-file-cat').value;
      for(const file of files){
        const data = await readFileAsArrayBuffer(file);
        await db.put('files',{
          id: genId(),
          projectId: PROJECT_ID,
          name: file.name,
          category: cat,
          mimeType: file.type,
          size: file.size,
          data,
          uploadedAt: Date.now(),
        });
      }
      closeModal();
      renderTab('files');
    }},
    {label:'취소', cls:'btn-ghost', action:()=>closeModal()},
  ]);
}

function readFileAsArrayBuffer(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result);
    r.onerror=e=>rej(e);
    r.readAsArrayBuffer(file);
  });
}

async function loadFiles(){
  let items = await db.getByIndex('files','projectId',PROJECT_ID);
  items.sort((a,b)=>b.uploadedAt-a.uploadedAt);
  if(fileFilter!=='전체') items=items.filter(f=>f.category===fileFilter);
  if(fileSearch){
    const q=fileSearch.toLowerCase();
    items=items.filter(f=>(f.name||'').toLowerCase().includes(q));
  }
  const el = document.getElementById('file-list');
  if(!el) return;
  if(!items.length){
    el.innerHTML=`<div class="empty-state"><p>파일이 없습니다</p><span>${fileSearch?'검색 결과가 없습니다':'위 영역에 파일을 드래그하거나 클릭하여 업로드하세요'}</span></div>`;
    return;
  }
  el.innerHTML = items.map(f=>{
    const m = FILE_CAT_META[f.category]||{cls:'fc-etc',icon:'📌'};
    return `
    <div class="file-item fcat ${m.cls}">
      <span class="file-icon">${fileIcon(f.mimeType)}</span>
      <div class="file-info">
        <div class="file-name">${esc(f.name)}</div>
        <div class="file-meta">
          <span class="file-cat-badge fcat-badge ${m.cls}">${m.icon} ${esc(f.category)}</span>
          <span>${fmtSize(f.size)}</span>
          <span>${new Date(f.uploadedAt).toLocaleDateString('ko-KR')}</span>
        </div>
      </div>
      <button class="btn-ghost" onclick="renameFile('${f.id}')">✏️ 이름 변경</button>
      <button class="btn-ghost" onclick="downloadFile('${f.id}')">⬇ 다운로드</button>
      <button class="btn-ghost" onclick="deleteFile('${f.id}')" style="color:var(--red)">🗑️</button>
    </div>`;
  }).join('');

async function downloadFile(id){
  const f = await db.get('files', id);
  if(!f) return;
  const blob = new Blob([f.data], {type:f.mimeType||'application/octet-stream'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=f.name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

async function deleteFile(id){
  const f = await db.get('files', id);
  if(!f) return;
  pushUndo('files', f, f.name||'파일', ()=>renderTab('files'));
  await db.delete('files', id);
  showToast('삭제됨 · Ctrl+Z로 실행 취소');
  renderTab('files');
}

  `,[
    {label:'저장', cls:'btn-primary', action: async()=>{
      const newName = document.getElementById('f-rename').value.trim();
      if(!newName){alert('파일 이름을 입력해주세요');return false;}

      await db.put('files', f);
      closeModal();
      loadFiles();
    }},

  if(issueFilter!=='all') items=items.filter(i=>i.status===issueFilter);
  const el=document.getElementById('issue-list');
  if(!el) return;
  if(!items.length){
    el.innerHTML=`<div class="empty-state"><p>이슈가 없습니다</p><span>+ 이슈 등록으로 추가해보세요</span></div>`;
    return;
  }
  const priorityLabel={high:'높음',medium:'보통',low:'낮음'};
  const statusLabel={'open':'발견','in-progress':'처리','resolved':'완료'};
  el.innerHTML=items.map(i=>`

// ── MARKDOWN ─────────────────────────────────────────────────────
function inlineFmt(s){
  return s
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/~~(.+?)~~/g,'<del>$1</del>')
    .replace(/==(.+?)==/g,'<mark>$1</mark>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
}
function renderMarkdown(raw, opts={}){
  if(!raw) return '';
  const lines=raw.split('\n');
  let html='',inUl=false,inOl=false,inBq=false,inCode=false,codeLines=[],codeLang='',chkIdx=0;
  const e=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const closeList=()=>{
    if(inUl){html+='</ul>';inUl=false;}
    if(inOl){html+='</ol>';inOl=false;}
  };
  const closeBq=()=>{if(inBq){html+='</blockquote>';inBq=false;}};
  for(const line of lines){
    // ── 코드 블록 ───────────────────────────────────────────────────
    const fence=line.match(/^```(\w*)$/);
    if(fence){
      if(!inCode){closeList();closeBq();inCode=true;codeLang=fence[1];codeLines=[];}
      else{
        html+=`<pre><code${codeLang?` class="lang-${codeLang}"`:''}>${codeLines.map(l=>e(l)).join('\n')}</code></pre>`;
        inCode=false;codeLines=[];codeLang='';
      }
      continue;
    }
    if(inCode){codeLines.push(line);continue;}
    // ── 인용구와 비-인용구 구분 ────────────────────────────────────
    const bqMatch=line.match(/^> ?(.*)/);
    if(!bqMatch) closeBq();
    // ── 제목 ───────────────────────────────────────────────────────
    if(/^#### /.test(line)){closeList();html+=`<h6>${inlineFmt(e(line.slice(5)))}</h6>`;continue;}
    if(/^### /.test(line)){closeList();html+=`<h5>${inlineFmt(e(line.slice(4)))}</h5>`;continue;}
    if(/^## /.test(line)){closeList();html+=`<h4>${inlineFmt(e(line.slice(3)))}</h4>`;continue;}
    if(/^# /.test(line)){closeList();html+=`<h3>${inlineFmt(e(line.slice(2)))}</h3>`;continue;}
    // ── 구분선 ─────────────────────────────────────────────────────
    if(/^---+$/.test(line)){closeList();html+='<hr>';continue;}
    // ── 인용구 ─────────────────────────────────────────────────────
    if(bqMatch){
      closeList();
      if(!inBq){html+='<blockquote>';inBq=true;}
      const inner=bqMatch[1];
      if(inner.trim()==='') html+='<br>';
      else html+=`<p>${inlineFmt(e(inner))}</p>`;
      continue;
    }
    // ── 체크박스 ───────────────────────────────────────────────────
    const chk=line.match(/^- \[(x| )\] (.+)/);
    if(chk){
      const done=chk[1]==='x';
      const idx=chkIdx++;
      const clickAttr=opts.checkClick?` data-chk="${idx}" role="checkbox" aria-checked="${done}" tabindex="0"`:'';
      closeList();
      html+=`<div class="md-check${done?' done':''}${opts.checkClick?' clickable':''}"${clickAttr}>${done?'☑':'☐'} ${inlineFmt(e(chk[2]))}</div>`;
      continue;
    }
    // ── 목록 ───────────────────────────────────────────────────────
    const ul=line.match(/^[-*] (.+)/);
    if(ul){if(!inUl){closeList();html+='<ul>';inUl=true;}html+=`<li>${inlineFmt(e(ul[1]))}</li>`;continue;}
    const ol=line.match(/^\d+\. (.+)/);
    if(ol){if(!inOl){closeList();html+='<ol>';inOl=true;}html+=`<li>${inlineFmt(e(ol[1]))}</li>`;continue;}
    // ── 일반 단락 ──────────────────────────────────────────────────
    closeList();
    if(line.trim()===''){html+='<br>';continue;}
    html+=`<p>${inlineFmt(e(line))}</p>`;
  }
  closeList();
  closeBq();
  if(inCode&&codeLines.length) html+=`<pre><code>${codeLines.map(l=>e(l)).join('\n')}</code></pre>`;
  return html;
}

// ── TOOLBAR INSERT ────────────────────────────────────────────────
function applyFormat(cmd, ta){
  const s=ta.selectionStart, e=ta.selectionEnd;
  const val=ta.value, sel=val.slice(s,e);
  const before=val.slice(0,s), after=val.slice(e);
  const lineStart=before.lastIndexOf('\n')+1;
  const linePrefix=before.slice(lineStart);

  const LINE_CMDS={'h1':'# ','h2':'## ','h3':'### ','h4':'#### ','ul':'- ','ol':'1. ','check':'- [ ] ','blockquote':'> '};
  if(LINE_CMDS[cmd]){
    const prefix=LINE_CMDS[cmd];
    let clean=linePrefix;
    for(const p of Object.values(LINE_CMDS)){if(clean.startsWith(p)){clean=clean.slice(p.length);break;}}
    const removed=linePrefix.length-clean.length;
    if(linePrefix.startsWith(prefix)&&removed===prefix.length){
      ta.value=val.slice(0,lineStart)+clean+val.slice(lineStart+linePrefix.length);
      ta.setSelectionRange(Math.max(lineStart,s-prefix.length),Math.max(lineStart,e-prefix.length));
    } else {
      ta.value=val.slice(0,lineStart)+prefix+clean+val.slice(lineStart+linePrefix.length);
      ta.setSelectionRange(s-removed+prefix.length,e-removed+prefix.length);
    }
    ta.focus();return;
  }
  if(cmd==='hr'){
    const ins='\n---\n';
    ta.value=before+ins+after;
    ta.setSelectionRange(s+ins.length,s+ins.length);
    ta.focus();return;
  }
  if(cmd==='codeblock'){
    if(sel){
      const ins='```\n'+sel+'\n```';
      ta.value=before+ins+after;
      ta.setSelectionRange(s+4,s+4+sel.length);
    } else {
      const ins='```\n코드\n```';
      ta.value=before+ins+after;
      ta.setSelectionRange(s+4,s+6);
    }
    ta.focus();return;
  }
  if(cmd==='link'){
    if(sel){
      const ins='['+sel+'](url)';
      ta.value=before+ins+after;
      ta.setSelectionRange(s+sel.length+3,s+sel.length+6);
    } else {
      const ins='[링크텍스트](url)';
      ta.value=before+ins+after;
      ta.setSelectionRange(s+1,s+6);
    }
    ta.focus();return;
  }
  const WRAP={bold:'**',italic:'*',code:'`',strike:'~~',highlight:'=='};
  if(WRAP[cmd]){
    const w=WRAP[cmd];
    const placeholder={bold:'굵게',italic:'기울임',code:'코드',strike:'취소선',highlight:'강조'}[cmd];
    if(sel){
      if(before.endsWith(w)&&after.startsWith(w)){
        ta.value=before.slice(0,-w.length)+sel+after.slice(w.length);
        ta.setSelectionRange(s-w.length,e-w.length);
      } else {
        ta.value=before+w+sel+w+after;
        ta.setSelectionRange(s,e+w.length*2);
      }
    } else {
      ta.value=before+w+placeholder+w+after;
      ta.setSelectionRange(s+w.length,s+w.length+placeholder.length);
    }
    ta.focus();
  }
}

const TB_ITEMS=[

  {sep:true},
  {cmd:'hr',label:'— 구분선',title:'구분선  (---)'},
];
function makeToolbarHtml(targetId){
  const btns=TB_ITEMS.map(t=>
    t.sep?'<span class="tb-sep"></span>'
    :`<button type="button" data-cmd="${t.cmd}" title="${t.title}">${t.label}</button>`
  ).join('');
  return `<div class="note-toolbar" data-target="${targetId}">${btns}</div>`;
}
function attachToolbars(root){
  (root||document).querySelectorAll('.note-toolbar[data-target]').forEach(tb=>{
    const ta=document.getElementById(tb.dataset.target);
    if(!ta) return;
    tb.addEventListener('click',e=>{
      const btn=e.target.closest('[data-cmd]');
      if(btn) applyFormat(btn.dataset.cmd,ta);
    });
  });
}
function makeSplitEditor(taId, prevId, placeholder, rows, value){

    <div class="editor-split">
      <div class="editor-pane-write">

function attachLivePreview(taId, prevId){
  const ta=document.getElementById(taId);
  const prev=document.getElementById(prevId);
  if(!ta||!prev) return;
  const update=()=>{prev.innerHTML=renderMarkdown(ta.value);};
  ta.addEventListener('input',update);
  update();
}

// ── SNIPPET TAB ──────────────────────────────────────────────────
let snippetCatFilter = '';
let snippetSearch = '';

async function renderSnippets(){
  const el = document.getElementById('tab-content');
  const all = (await db.getAll('snippets')).sort((a,b)=>(b.useCount||0)-(a.useCount||0)||(b.createdAt-a.createdAt));

  const cats = [...new Set(all.map(s=>s.category).filter(Boolean))].sort();

  const filtered = all.filter(s=>{
    const matchCat = !snippetCatFilter || s.category===snippetCatFilter;
    const q = snippetSearch.toLowerCase();
    const matchQ = !q || (s.title||'').toLowerCase().includes(q) || (s.content||'').toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  const catChips = ['전체',...cats].map(c=>`
    <span class="snippet-cat-chip${(c==='전체'?!snippetCatFilter:snippetCatFilter===c)?' active':''}" data-cat="${c==='전체'?'':c}">${c}</span>
  `).join('');

  const cards = filtered.length ? filtered.map(s=>`
    <div class="snippet-card" data-sid="${s.id}">
      <div class="snippet-card-head">
        ${s.category?`<span class="snippet-cat-badge">${esc(s.category)}</span>`:''}
        <span class="snippet-card-title">${esc(s.title||'(제목 없음)')}</span>
        <div class="snippet-card-actions">
          <button data-edit-sid="${s.id}" title="수정">✏️</button>
          <button data-del-sid="${s.id}" title="삭제">🗑️</button>
        </div>
      </div>
      <div class="snippet-card-body">
        <div class="snippet-card-preview">${esc(s.content||'')}</div>
      </div>
      <div class="snippet-card-foot">
        <button class="snippet-copy-btn" data-copy-sid="${s.id}">📋 복사</button>
        ${(s.useCount||0)>0?`<span class="snippet-use-count">복사 ${s.useCount}회</span>`:''}
      </div>
    </div>`).join('')
    : `<div class="snippet-empty"><div style="font-size:32px">✂️</div><div>${snippetSearch||snippetCatFilter?'검색 결과 없음':'스니펫을 추가해보세요'}</div></div>`;

  el.innerHTML = `
    <div class="list-pane">
      <div class="tab-toolbar">
        <input class="snippet-search" id="snippet-search-input" type="search" placeholder="제목·내용 검색" value="${esc(snippetSearch)}">
        <button class="btn-primary" id="btn-snippet-add">+ 스니펫 추가</button>
      </div>
      <div class="snippet-cats">${catChips}</div>
      <div class="snippet-grid" id="snippet-grid">${cards}</div>
    </div>
    <div class="pane-resizer" id="pane-resizer"></div>
    <div class="thread-pane" id="thread-pane"></div>`;

  document.getElementById('snippet-search-input').addEventListener('input', e=>{
    snippetSearch=e.target.value; renderSnippets();
  });
  document.querySelector('.snippet-cats').addEventListener('click', e=>{
    const chip=e.target.closest('[data-cat]');
    if(!chip) return;
    snippetCatFilter=chip.dataset.cat; renderSnippets();
  });
  document.getElementById('btn-snippet-add').addEventListener('click', ()=>showSnippetModal(null));
  document.getElementById('snippet-grid').addEventListener('click', async e=>{
    const copyBtn=e.target.closest('[data-copy-sid]');
    if(copyBtn){ await copySnippet(copyBtn.dataset.copySid); return; }
    const editBtn=e.target.closest('[data-edit-sid]');
    if(editBtn){ showSnippetModal(editBtn.dataset.editSid); return; }
    const delBtn=e.target.closest('[data-del-sid]');
    if(delBtn){ await deleteSnippet(delBtn.dataset.delSid); return; }
    // 카드 전체 클릭 → 복사
    const card=e.target.closest('.snippet-card');
    if(card && !e.target.closest('button')) await copySnippet(card.dataset.sid);
  });
}

async function copySnippet(id){
  const s=await db.get('snippets',id);
  if(!s) return;
  await navigator.clipboard.writeText(s.content||'');
  s.useCount=(s.useCount||0)+1;
  s.updatedAt=Date.now();
  await db.put('snippets',s);
  showToast('📋 클립보드에 복사됐습니다');
  // 복사 횟수 즉시 갱신
  const countEl=document.querySelector(`[data-sid="${id}"] .snippet-use-count`);
  if(countEl){ countEl.textContent=`복사 ${s.useCount}회`; }
  else{
    const foot=document.querySelector(`[data-sid="${id}"] .snippet-card-foot`);
    if(foot){ const sp=document.createElement('span');sp.className='snippet-use-count';sp.textContent=`복사 ${s.useCount}회`;foot.appendChild(sp); }
  }
}

async function deleteSnippet(id){
  const item = await db.get('snippets', id);
  if(!item) return;
  pushUndo('snippets', item, item.title||'스니펫', ()=>renderSnippets());
  await db.delete('snippets', id);
  showToast('삭제됨 · Ctrl+Z로 실행 취소');
  renderSnippets();
}

function showSnippetModal(id){
  db.get('snippets',id||'__none__').then(item=>{
    const PRESET_CATS=['이메일','공지','답변','안내문','기타'];
    showModal(id?'스니펫 수정':'스니펫 추가',`
      <div class="form-row">
        <label>제목 *</label>
        <input type="text" id="sn-title" placeholder="스니펫 이름" value="${esc(item?.title||'')}">
      </div>
      <div class="form-row">
        <label>카테고리</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px" id="sn-cat-chips">
          ${PRESET_CATS.map(c=>`<span class="snippet-cat-chip${item?.category===c?' active':''}" data-preset="${c}" style="cursor:pointer">${c}</span>`).join('')}
        </div>
        <input type="text" id="sn-cat" placeholder="직접 입력 또는 위에서 선택" value="${esc(item?.category||'')}">
      </div>
      <div class="form-row">
        <label>내용 *</label>
        ${makeToolbarHtml('sn-content')}
        <textarea id="sn-content" rows="8" placeholder="복사해서 쓸 내용을 입력하세요" style="border-radius:0 0 var(--radius) var(--radius)">${esc(item?.content||'')}</textarea>
      </div>`,
      [{label:'저장', cls:'btn-primary', action:async()=>{
        const title=document.getElementById('sn-title').value.trim();
        const content=document.getElementById('sn-content').value.trim();
        if(!title){alert('제목을 입력해주세요');return false;}
        if(!content){alert('내용을 입력해주세요');return false;}
        await db.put('snippets',{
          id:item?.id||genId(),
          title, content,
          category:document.getElementById('sn-cat').value.trim(),
          useCount:item?.useCount||0,
          createdAt:item?.createdAt||Date.now(),
          updatedAt:Date.now()
        });
        closeModal(); renderSnippets();
      }},
      {label:'취소', cls:'btn-ghost', action:()=>closeModal()},
      ...(id?[{label:'삭제', cls:'btn-danger', action:()=>deleteSnippet(id)}]:[])
    ]);
    // 툴바 + 프리셋 칩 클릭 → 인풋 자동 입력
    setTimeout(()=>{
      attachToolbars(document.getElementById('modal-body'));
      document.getElementById('sn-cat-chips')?.addEventListener('click', e=>{
        const chip=e.target.closest('[data-preset]');
        if(!chip) return;
        document.querySelectorAll('#sn-cat-chips .snippet-cat-chip').forEach(c=>c.classList.remove('active'));
        chip.classList.add('active');
        document.getElementById('sn-cat').value=chip.dataset.preset;
      });
    },50);
  });
}

async function renderNotes(){
  const el=document.getElementById('tab-content');
  el.innerHTML=`
    <div class="list-pane" id="list-pane">
      <div class="tab-toolbar">
        <input type="text" id="note-search" placeholder="노트 검색..." value="${esc(noteSearch)}">
        <button class="btn-primary" id="btn-add-note">+ 노트 추가</button>
      </div>
      <div class="note-cat-bar" id="note-cat-bar"></div>
      <div id="note-list"></div>
    </div>
    <div class="pane-resizer" id="pane-resizer"></div>
    <div class="thread-pane" id="thread-pane"></div>
  `;
  document.getElementById('note-search').addEventListener('input', e=>{
    noteSearch=e.target.value; loadNotes();
  });
  document.getElementById('btn-add-note').addEventListener('click',()=>showNoteModal(null));
  document.getElementById('note-cat-bar').addEventListener('click', e=>{
    const chip=e.target.closest('.cat-chip');
    if(chip){ noteCat=chip.dataset.cat||''; loadNotes(); }
  });
  document.getElementById('note-list').addEventListener('click', async e=>{
    if(e.target.closest('.card-actions,.note-drag-handle')) return;
    const chkEl=e.target.closest('.md-check.clickable');
    if(chkEl){
      const card=chkEl.closest('[data-note-id]');
      if(card) await toggleNoteCheck(card.dataset.noteId, parseInt(chkEl.dataset.chk));
      return;
    }
    const h=e.target.closest('[data-thread-id]');
    if(h) openThread(h.dataset.threadId, h.dataset.threadType);
  });
  await loadNotes();
}

async function loadNotes(){
  let items=await db.getByIndex('notes','projectId',PROJECT_ID);

  // order 필드 기준 정렬, 없으면 updatedAt 역순
  items.sort((a,b)=>{
    if(a.order!=null && b.order!=null) return a.order-b.order;
    if(a.order!=null) return -1;
    if(b.order!=null) return 1;
    return b.updatedAt-a.updatedAt;
  });

  // 카테고리 칩 렌더
  const cats=[...new Set(items.map(i=>i.category).filter(Boolean))];
  const catBar=document.getElementById('note-cat-bar');
  if(catBar){
    catBar.innerHTML=[
      `<button class="cat-chip${!noteCat?' active':''}" data-cat="">전체</button>`,
      ...cats.map(c=>`<button class="cat-chip${noteCat===c?' active':''}" data-cat="${esc(c)}">${esc(c)}</button>`)
    ].join('');
  }

  // 필터
  if(noteCat) items=items.filter(i=>i.category===noteCat);
  if(noteSearch){
    const q=noteSearch.toLowerCase();
    items=items.filter(i=>(i.title||'').toLowerCase().includes(q)||(i.content||'').toLowerCase().includes(q));
  }

  const el=document.getElementById('note-list');
  if(!el) return;
  if(!items.length){
    el.innerHTML=`<div class="empty-state"><p>노트가 없습니다</p><span>+ 노트 추가로 첫 메모를 작성해보세요</span></div>`;
    return;
  }
  el.innerHTML=items.map(n=>{
    const rendered=renderMarkdown(n.content||'',{checkClick:true});
    const isLong=(n.content||'').split('\n').length>6||(n.content||'').length>300;
    const catBadge=n.category?`<span class="note-cat-badge">${esc(n.category)}</span>`:'';
    const sel=selectedItem?.id===n.id?' card-selected':'';
    return `
    <div class="note-card${sel}" data-note-id="${n.id}"
      draggable="true"
      ondragstart="noteDragStart(event,'${n.id}')"
      ondragover="noteDragOver(event)"
      ondragleave="noteDragLeave(event)"
      ondrop="noteDrop(event,'${n.id}')"
      ondragend="noteDragEnd(event)">
      <div class="note-card-header" data-thread-id="${n.id}" data-thread-type="note">
        <span class="note-drag-handle" title="드래그하여 순서 변경">⠿</span>
        ${catBadge}
        <span class="note-card-title thread-trigger">${esc(n.title)||'(제목 없음)'}</span>
        <span class="note-card-date">${new Date(n.updatedAt).toLocaleDateString('ko-KR')}</span>
        <div class="card-actions">
          <button onclick="showNoteModal('${n.id}')" title="수정">✏️</button>
          <button onclick="deleteNote('${n.id}')" title="삭제">🗑️</button>
        </div>
      </div>
      <div class="note-card-body" id="nb-${n.id}">
        <div class="note-rendered">${rendered}</div>
        ${isLong?'<div class="note-card-fade"></div>':''}
      </div>
      ${isLong?`<button class="note-expand-btn" onclick="toggleNoteExpand('${n.id}')">더 보기 ▾</button>`:''}
    </div>`;
  }).join('');
}

async function toggleNoteCheck(noteId, idx){
  const note=await db.get('notes',noteId);
  if(!note) return;
  let count=0;
  const lines=note.content.split('\n');
  for(let i=0;i<lines.length;i++){
    if(/^- \[(x| )\] /.test(lines[i])){
      if(count===idx){
        lines[i]=lines[i].startsWith('- [x] ')
          ?lines[i].replace('- [x] ','- [ ] ')
          :lines[i].replace('- [ ] ','- [x] ');
        break;
      }
      count++;
    }
  }
  note.content=lines.join('\n');
  note.updatedAt=Date.now();
  await db.put('notes',note);
  await loadNotes();
}

function toggleNoteExpand(id){
  const body=document.getElementById('nb-'+id);
  const btn=body.nextElementSibling;
  body.classList.toggle('expanded');
  btn.textContent=body.classList.contains('expanded')?'접기 ▴':'더 보기 ▾';
}

async function deleteNote(id){
  const item = await db.get('notes', id);
  if(!item) return;
  pushUndo('notes', item, item.title||'노트', ()=>{closeModal();renderTab('notes');});
  await db.delete('notes', id);
  closeModal();
  showToast('삭제됨 · Ctrl+Z로 실행 취소');
  renderTab('notes');
}

function setNoteCat(cat){
  noteCat=cat;
  loadNotes();
}

function noteDragStart(e,id){
  _dragNoteId=id;
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{
    const el=document.querySelector(`[data-note-id="${id}"]`);
    if(el) el.classList.add('dragging');
  },0);
}

function noteDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const card=e.currentTarget;
  if(card.dataset.noteId!==_dragNoteId) card.classList.add('drag-over');
}

function noteDragLeave(e){
  if(!e.currentTarget.contains(e.relatedTarget)){
    e.currentTarget.classList.remove('drag-over');
  }
}

async function noteDrop(e,targetId){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!_dragNoteId||_dragNoteId===targetId){_dragNoteId=null;return;}
  const cards=[...document.querySelectorAll('[data-note-id]')];
  const ids=cards.map(c=>c.dataset.noteId);
  const fromIdx=ids.indexOf(_dragNoteId);
  const toIdx=ids.indexOf(targetId);
  if(fromIdx<0||toIdx<0){_dragNoteId=null;return;}
  ids.splice(fromIdx,1);
  ids.splice(toIdx,0,_dragNoteId);
  for(let i=0;i<ids.length;i++){
    const note=await db.get('notes',ids[i]);
    if(note) await db.put('notes',{...note,order:i});
  }
  _dragNoteId=null;
  await loadNotes();
}

function noteDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.note-card.drag-over').forEach(el=>el.classList.remove('drag-over'));
  _dragNoteId=null;
}

async function renderTodo(){

async function renderTodoCal(){
  const allTodos = await db.getByIndex('todos','projectId',PROJECT_ID);
  todoDotDates = new Set(allTodos.map(t=>t.date));

  const {year, month} = todoCal;
  const todayStr = new Date().toISOString().slice(0,10);
  const firstDow = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month+1, 0).getDate();
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  let cells = '';
  for(let i=0;i<firstDow;i++) cells += `<div class="cal-day empty"></div>`;
  for(let d=1;d<=lastDate;d++){
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let cls = 'cal-day';
    if(ds===todayStr) cls += ' today';
    if(ds===todoSelectedDate) cls += ' selected';
    cells += `<div class="${cls}" data-cal-date="${ds}">${d}${todoDotDates.has(ds)?'<div class="cal-dot"></div>':''}</div>`;
  }
  const totalCells = firstDow + lastDate;
  for(let i=0;i<(7-totalCells%7)%7;i++) cells += `<div class="cal-day empty"></div>`;

  const pane = document.getElementById('todo-cal-pane');
  if(!pane) return;
  pane.innerHTML = `
    <div class="cal-header">
      <button class="cal-nav" id="cal-prev">‹</button>
      <span class="cal-month-label">${year}년 ${monthNames[month]}</span>
      <button class="cal-nav" id="cal-next">›</button>
    </div>
    <div class="cal-grid">
      ${DAYS_KO.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${cells}
    </div>
  `;

  document.getElementById('cal-prev').addEventListener('click',()=>{
    if(todoCal.month===0) todoCal={year:todoCal.year-1,month:11};
    else todoCal={...todoCal,month:todoCal.month-1};
    renderTodoCal();
  });
  document.getElementById('cal-next').addEventListener('click',()=>{
    if(todoCal.month===11) todoCal={year:todoCal.year+1,month:0};
    else todoCal={...todoCal,month:todoCal.month+1};
    renderTodoCal();
  });
  pane.addEventListener('click',e=>{
    const cell=e.target.closest('[data-cal-date]');
    if(!cell) return;
    todoSelectedDate=cell.dataset.calDate;
    renderTodoCal();
    loadTodayTodos();
  });
}

function todoDateLabel(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  return `${d.getMonth()+1}/${d.getDate()}(${DAYS_KO[d.getDay()]})`;
}

async function renderTodoDeadlineBody(){
  const body = document.getElementById('todo-view-body');
  if(!body) return;
  const allTodos = await db.getByIndex('todos','projectId',PROJECT_ID);
  const today = new Date().toISOString().slice(0,10);
  const todayDate = new Date(today);

  const items = allTodos.filter(t=>!t.done && t.deadline).sort((a,b)=>a.deadline.localeCompare(b.deadline));

  if(!items.length){
    body.innerHTML=`<div class="deadline-no-items">
      <div style="font-size:32px">📋</div>
      <div style="font-weight:600">마감일이 지정된 미완료 할일이 없습니다</div>
      <div style="font-size:12px;color:var(--text3)">회의록에서 <code>~날짜</code>로 추출하거나<br>할일 수정에서 기한을 설정하세요</div>
    </div>`;
    return;
  }

  // 기준 날짜 계산
  const thisWeekEnd=(()=>{const d=new Date(todayDate);d.setDate(d.getDate()+(6-d.getDay()));return d.toISOString().slice(0,10);})();
  const nextWeekEnd=(()=>{const d=new Date(todayDate);d.setDate(d.getDate()+7+(6-d.getDay()));return d.toISOString().slice(0,10);})();
  const thisMonthEnd=new Date(todayDate.getFullYear(),todayDate.getMonth()+1,0).toISOString().slice(0,10);

  const groups=[
    {key:'overdue',  label:'⚠️ 지연',    cls:'overdue',     items:[]},
    {key:'thisweek', label:'📅 이번 주',  cls:'this-week',   items:[]},
    {key:'nextweek', label:'📆 다음 주',  cls:'next-week',   items:[]},
    {key:'month',    label:'🗓️ 이번 달', cls:'this-month',  items:[]},
    {key:'later',    label:'📌 그 이후', cls:'later',        items:[]},
  ];
  for(const t of items){
    if(t.deadline<today) groups[0].items.push(t);
    else if(t.deadline<=thisWeekEnd) groups[1].items.push(t);
    else if(t.deadline<=nextWeekEnd) groups[2].items.push(t);
    else if(t.deadline<=thisMonthEnd) groups[3].items.push(t);
    else groups[4].items.push(t);
  }

  const dTag=(dl)=>{
    const diff=Math.round((new Date(dl)-new Date(today))/86400000);
    if(diff<0) return `D+${Math.abs(diff)}`;
    if(diff===0) return 'D-Day';
    return `D-${diff}`;
  };

  let html='<div class="deadline-view">';
  for(const g of groups){
    if(!g.items.length) continue;
    html+=`<div class="deadline-group ${g.cls}">
      <div class="deadline-group-header">
        <span class="deadline-group-label">${g.label}</span>
        <span class="deadline-group-count">${g.items.length}건</span>
      </div>`;
    for(const t of g.items){
      const isOverdue=t.deadline<today, isSoon=!isOverdue&&t.deadline<=thisWeekEnd;
      const dateTag=`<span class="deadline-item-date ${isOverdue?'overdue':isSoon?'soon':''}">${dTag(t.deadline)}<br><span style="font-size:10px;font-weight:400">${t.deadline}</span></span>`;
      html+=todoItemHTML(t, dateTag);
    }
    html+='</div>';
  }
  html+='</div>';
  body.innerHTML=html;

  body.addEventListener('change', async e=>{
    const id=e.target.dataset.chkId; if(!id) return;
    const t=await db.get('todos',id); if(!t) return;
    t.done=!t.done; await db.put('todos',t);
    await renderTodoDeadlineBody();
  });
  body.addEventListener('click', async e=>{
    const edit=e.target.closest('[data-edit-id]');
    if(edit){await editTodoModal(edit.dataset.editId);return;}
    const del=e.target.closest('[data-del-id]');
    if(del){await deleteTodo(del.dataset.delId);}
  });
}

        <button class="todo-add-btn" id="btn-todo-add">추가</button>
      </div>
      <div class="todo-detail-fields hidden" id="todo-detail-fields">
        <div><input type="time" id="todo-time" placeholder="시간 (예: 14:00)"></div>
        <div><input type="text" id="todo-assignee" placeholder="담당자"></div>

        <div class="memo-row"><input type="text" id="todo-memo" placeholder="메모"></div>

    <div id="todo-list">

        ? `<div class="empty-state"><p>할 일이 없습니다</p><span>위에서 추가해보세요</span></div>`
        : items.map(t=>{
            const extra = t.originalDate
              ? `<span class="todo-rolled-badge" title="${t.originalDate}에서 이월">

                 </span>`

          }).join('')}

  const detailToggle = document.getElementById('todo-detail-toggle');
  const detailFields = document.getElementById('todo-detail-fields');

  });

  const doAdd = async()=>{
    const content = input.value.trim();
    if(!content) return;
    const time = document.getElementById('todo-time')?.value||'';
    const assignee = document.getElementById('todo-assignee')?.value.trim()||'';
    const deadline = document.getElementById('todo-deadline')?.value||'';
    const memo = document.getElementById('todo-memo')?.value.trim()||'';
    await db.put('todos',{
      id:genId(), projectId:PROJECT_ID, date:todoSelectedDate,
      content, time, assignee, deadline, memo, done:false, createdAt:Date.now()
    });
    await refreshTodoView();
  };

  addBtn.addEventListener('click', doAdd);
  input.addEventListener('keydown', e=>{ if(e.key==='Enter'){e.preventDefault();doAdd();} });

  document.getElementById('btn-todo-delete-all')?.addEventListener('click', async()=>{
    if(!confirm(`${dateLabel}의 할일 ${items.length}개를 모두 삭제하시겠습니까?`)) return;
    await Promise.all(items.map(t=>db.delete('todos',t.id)));
    await refreshTodoView();
  });

  listPane.addEventListener('change', async e=>{
    const id = e.target.dataset.chkId;
    if(!id) return;
    const t = await db.get('todos',id);
    if(!t) return;
    t.done = !t.done;
    await db.put('todos',t);
    await refreshTodoView();
  });

  listPane.addEventListener('click', async e=>{
    const rollBtn = e.target.closest('[data-rollover-id]');
    if(rollBtn){ await rolloverTodo(rollBtn.dataset.rolloverId); return; }
    const restoreBtn = e.target.closest('[data-restore-id]');
    if(restoreBtn){ await restoreTodo(restoreBtn.dataset.restoreId); return; }
    const editBtn = e.target.closest('[data-edit-id]');
    if(editBtn){ await editTodoModal(editBtn.dataset.editId); return; }
    const delBtn = e.target.closest('[data-del-id]');
    if(delBtn){ await deleteTodo(delBtn.dataset.delId); return; }
  });
}

async function rolloverTodo(id){
  const t = await db.get('todos', id);
  if(!t) return;
  t.originalDate = t.date;
  t.date = new Date().toISOString().slice(0,10);
  await db.put('todos', t);
  await refreshTodoView();
}

async function rolloverAllTodos(){
  const todayStr = new Date().toISOString().slice(0,10);
  const all = await db.getByIndex('todos','projectId',PROJECT_ID);
  const overdue = all.filter(t=>!t.done && t.date < todayStr);
  await Promise.all(overdue.map(t=>{
    t.originalDate = t.originalDate || t.date;
    t.date = todayStr;
    return db.put('todos',t);
  }));
  showToast(`↩ ${overdue.length}개 오늘로 이월했습니다`);
  await refreshTodoView();
}

async function rolloverTodoToDate(id, targetDate){
  const t = await db.get('todos', id);
  if(!t) return;
  t.originalDate = t.originalDate || t.date;
  t.date = targetDate;
  await db.put('todos', t);
  await renderTodoWeeklyBody();
}

async function restoreTodo(id){
  const t = await db.get('todos', id);
  if(!t?.originalDate) return;
  t.date = t.originalDate;
  delete t.originalDate;
  await db.put('todos', t);
  await refreshTodoView();
}

async function refreshTodoView(){
  if(todoView==='daily'){ await renderTodoCal(); await loadTodayTodos(); }
  else if(todoView==='weekly'){ await renderTodoWeeklyBody(); }
  else if(todoView==='deadline'){ await renderTodoDeadlineBody(); }
  else { await renderTodoMonthlyBody(); }
}

function localDateStr(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getWeekRange(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const dow=d.getDay();
  const mondayOffset=dow===0?-6:1-dow;
  const mon=new Date(d);
  mon.setDate(d.getDate()+mondayOffset);
  const dates=[];
  for(let i=0;i<7;i++){
    const day=new Date(mon);
    day.setDate(mon.getDate()+i);
    dates.push(localDateStr(day)); // 로컬 날짜 기준 (toISOString은 UTC라 KST에서 하루 밀림)
  }
  return dates; // [월,화,수,목,금,토,일]
}

async function renderTodoWeeklyBody(){
  const body=document.getElementById('todo-view-body');
  if(!body) return;
  body.style.overflow='hidden';

  const allTodos=await db.getByIndex('todos','projectId',PROJECT_ID);
  const todayStr=localDateStr(new Date());
  const weekDates=getWeekRange(todoSelectedDate);
  const DAY_LABELS=['월','화','수','목','금','토','일'];

  // colsHtml 안에서 참조하므로 먼저 선언
  const isCurrentWeek = weekDates[0] <= todayStr && todayStr <= weekDates[6];

  const colsHtml=weekDates.map((ds,idx)=>{
    const isToday=ds===todayStr;
    const isWeekend=idx>=5;
    const d=new Date(ds+'T00:00:00');
    const dayItems=allTodos.filter(t=>t.date===ds).sort((a,b)=>a.createdAt-b.createdAt);
    const itemsHtml=dayItems.map(t=>`
      <div class="todo-week-card${t.done?' done-card':''}${t.originalDate?' rolled-card':''}"
           data-week-todo-id="${t.id}"
           ${t.originalDate&&isCurrentWeek?`draggable="true" data-drag-back-id="${t.id}"`:''}
      >${t.originalDate&&isCurrentWeek?'<span class="drag-handle" style="font-size:11px">⠿</span>':''}${esc(t.content)}${t.originalDate?`<span class="todo-rolled-badge" style="font-size:10px;margin-left:4px">${todoDateLabel(t.originalDate)}</span>`:''}
      </div>`).join('');
    return `
      <div class="todo-week-col${isWeekend?' weekend':''}${idx<5?` day-col-${idx}`:''}" data-week-date="${ds}">
        <div class="todo-week-col-header${isToday?' today-col':''}">
          <div class="todo-week-dow">${DAY_LABELS[idx]}</div>
          <div class="todo-week-date${isToday?' today-date':''}">${d.getMonth()+1}/${d.getDate()}</div>
        </div>
        <div class="todo-week-items" id="week-items-${ds}">${itemsHtml}</div>
        <button class="todo-week-add" data-week-add="${ds}">+ 추가</button>
      </div>`;
  }).join('');

  const monD=new Date(weekDates[0]+'T00:00:00');
  const sunD=new Date(weekDates[6]+'T00:00:00');
  const weekLabel=`${monD.getFullYear()}년 ${monD.getMonth()+1}월 ${monD.getDate()}일 ~ ${sunD.getMonth()+1}월 ${sunD.getDate()}일`;

  // 이번 주 보고 있을 때만 이월 섹션 표시
  const overdue = isCurrentWeek
    ? allTodos.filter(t=>!t.done && t.date < weekDates[0]).sort((a,b)=>a.date.localeCompare(b.date))
    : [];

  const rolloverHTML = isCurrentWeek ? `
    <div class="todo-rollover-section" id="week-rollover-section" style="margin-bottom:12px;flex-shrink:0">
      <div class="todo-rollover-header" onclick="document.getElementById('week-rollover-list').classList.toggle('hidden')">
        <span class="todo-rollover-count">${overdue.length}</span>
        <span class="todo-rollover-header-label">미완료 이월 항목</span>
        ${overdue.length?`<button class="btn-rollover-all" onclick="event.stopPropagation();rolloverAllTodos()">↩ 전체 이번 주로</button>`:''}
      </div>
      <div class="todo-rollover-list" id="week-rollover-list">
        ${overdue.length
          ? overdue.map(t=>`
              <div class="todo-rollover-item" draggable="true" data-drag-id="${t.id}">
                <span class="drag-handle">⠿</span>
                <span class="todo-rollover-from">${todoDateLabel(t.date)}</span>
                <span style="flex:1;font-size:13px;color:var(--text)">${esc(t.content)}</span>
                ${t.time?`<span class="todo-chip" style="font-size:11px">⏰ ${esc(t.time)}</span>`:''}
              </div>`).join('')
          : `<div class="week-rollover-dropzone" id="week-rollover-dropzone">
               이월된 항목을 여기로 드래그하면 원래 날짜로 되돌아갑니다
             </div>`}
      </div>
    </div>` : '';

  body.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-shrink:0">
      <button class="cal-nav" id="week-prev">‹</button>
      <span style="font-weight:700;font-size:14px;color:var(--text)">${weekLabel}</span>
      <button class="cal-nav" id="week-next">›</button>
      <button class="btn-ghost" id="week-today" style="margin-left:auto;font-size:12px">오늘</button>
    </div>
    ${rolloverHTML}
    <div class="todo-weekly-grid">${colsHtml}</div>`;

  document.getElementById('week-prev').addEventListener('click',()=>{
    const prev=new Date(weekDates[0]+'T00:00:00');
    prev.setDate(prev.getDate()-7);
    todoSelectedDate=localDateStr(prev);
    renderTodoWeeklyBody();
  });
  document.getElementById('week-next').addEventListener('click',()=>{
    const next=new Date(weekDates[0]+'T00:00:00');
    next.setDate(next.getDate()+7);
    todoSelectedDate=localDateStr(next);
    renderTodoWeeklyBody();
  });
  document.getElementById('week-today').addEventListener('click',()=>{
    todoSelectedDate=localDateStr(new Date());
    renderTodoWeeklyBody();
  });

  // 드래그앤드롭 — 이월 항목 → 요일 컬럼
  const rolloverSection = document.getElementById('week-rollover-section');
  if(rolloverSection){
    // 이월 섹션 → 컬럼 드래그
    rolloverSection.addEventListener('dragstart', e=>{
      const item = e.target.closest('[data-drag-id]');
      if(!item) return;
      e.dataTransfer.setData('text/plain', JSON.stringify({id:item.dataset.dragId, dir:'to-col'}));
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(()=>item.classList.add('is-dragging'), 0);
    });
    rolloverSection.addEventListener('dragend', e=>{
      const item = e.target.closest('[data-drag-id]');
      if(item) item.classList.remove('is-dragging');
    });
    // 컬럼 → 이월 섹션으로 되돌리기 드롭 존
    const rolloverList = document.getElementById('week-rollover-list');
    rolloverSection.addEventListener('dragover', e=>{
      const payload = (()=>{try{return JSON.parse(e.dataTransfer.types.includes('text/plain')?'{"dir":"to-col"}':'{}')}catch{return{}}})();
      // 컬럼에서 오는 드래그만 허용
      rolloverSection.classList.add('rollover-drop-active');
      e.preventDefault();
    });
    rolloverSection.addEventListener('dragleave', e=>{
      if(!rolloverSection.contains(e.relatedTarget)) rolloverSection.classList.remove('rollover-drop-active');
    });
    rolloverSection.addEventListener('drop', async e=>{
      e.preventDefault();
      rolloverSection.classList.remove('rollover-drop-active');
      try{
        const data = JSON.parse(e.dataTransfer.getData('text/plain'));
        if(data.dir==='to-rollover') await restoreTodo(data.id);
      }catch(err){}
    });
  }

  // 컬럼 카드 → 이월 섹션 드래그 시작
  document.querySelectorAll('[data-drag-back-id]').forEach(card=>{
    card.addEventListener('dragstart', e=>{
      e.dataTransfer.setData('text/plain', JSON.stringify({id:card.dataset.dragBackId, dir:'to-rollover'}));
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(()=>card.classList.add('is-dragging'), 0);
      e.stopPropagation();
    });
    card.addEventListener('dragend', ()=>card.classList.remove('is-dragging'));
  });

  document.querySelectorAll('.todo-week-col[data-week-date]').forEach(col=>{
    const targetDate = col.dataset.weekDate;
    col.addEventListener('dragover', e=>{
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      col.classList.add('drop-target');
    });
    col.addEventListener('dragleave', e=>{
      if(!col.contains(e.relatedTarget)) col.classList.remove('drop-target');
    });
    col.addEventListener('drop', async e=>{
      e.preventDefault();
      col.classList.remove('drop-target');
      try{
        const data = JSON.parse(e.dataTransfer.getData('text/plain'));
        if(data.dir==='to-col') await rolloverTodoToDate(data.id, targetDate);
      }catch(err){}
    });
  });

  body.addEventListener('click',async e=>{
    const addBtn=e.target.closest('[data-week-add]');
    if(addBtn){await quickAddWeeklyTodo(addBtn.dataset.weekAdd);return;}
    const card=e.target.closest('[data-week-todo-id]');
    if(card){await editTodoModal(card.dataset.weekTodoId);return;}
  });
}

async function renderTodoMonthlyBody(){
  const body=document.getElementById('todo-view-body');
  if(!body) return;
  body.style.overflowY='auto';

  const allTodos=await db.getByIndex('todos','projectId',PROJECT_ID);
  const todayStr=new Date().toISOString().slice(0,10);
  const {year,month}=todoCal;
  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const firstDow=new Date(year,month,1).getDay();
  const lastDate=new Date(year,month+1,0).getDate();

  const todoMap={};
  allTodos.forEach(t=>{
    if(!todoMap[t.date]) todoMap[t.date]=[];
    todoMap[t.date].push(t);
  });

  let cellsHtml='';
  for(let i=0;i<firstDow;i++) cellsHtml+=`<div class="todo-month-cell empty"></div>`;
  for(let d=1;d<=lastDate;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===todayStr;
    const dayTodos=(todoMap[ds]||[]).sort((a,b)=>a.createdAt-b.createdAt);
    const MAX=3;
    const previewHtml=dayTodos.slice(0,MAX).map(t=>
      `<div class="todo-month-item-preview${t.done?' done-preview':''}">${esc(t.content)}</div>`
    ).join('');
    const moreCount=dayTodos.length-MAX;
    const moreHtml=moreCount>0?`<div class="todo-month-more">+${moreCount}건</div>`:'';
    cellsHtml+=`
      <div class="todo-month-cell${isToday?' today-cell':''}" data-month-date="${ds}">
        <div class="todo-month-day-num">${d}</div>
        ${previewHtml}${moreHtml}
      </div>`;
  }
  const totalCells=firstDow+lastDate;
  const remainder=(7-totalCells%7)%7;
  for(let i=0;i<remainder;i++) cellsHtml+=`<div class="todo-month-cell empty"></div>`;

  body.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-shrink:0">
      <button class="cal-nav" id="month-prev">‹</button>
      <span style="font-weight:700;font-size:15px;color:var(--text)">${year}년 ${monthNames[month]}</span>
      <button class="cal-nav" id="month-next">›</button>
      <button class="btn-ghost" id="month-today" style="margin-left:auto;font-size:12px">오늘</button>
    </div>
    <div class="todo-monthly-grid">
      ${['일','월','화','수','목','금','토'].map(d=>`<div class="todo-month-dow-header">${d}</div>`).join('')}
      ${cellsHtml}
    </div>`;

  document.getElementById('month-prev').addEventListener('click',()=>{
    if(todoCal.month===0) todoCal={year:todoCal.year-1,month:11};
    else todoCal={...todoCal,month:todoCal.month-1};
    renderTodoMonthlyBody();
  });
  document.getElementById('month-next').addEventListener('click',()=>{
    if(todoCal.month===11) todoCal={year:todoCal.year+1,month:0};
    else todoCal={...todoCal,month:todoCal.month+1};
    renderTodoMonthlyBody();
  });
  document.getElementById('month-today').addEventListener('click',()=>{
    todoCal={year:new Date().getFullYear(),month:new Date().getMonth()};
    todoSelectedDate=new Date().toISOString().slice(0,10);
    renderTodoMonthlyBody();
  });

  body.addEventListener('click',e=>{
    const cell=e.target.closest('[data-month-date]');
    if(!cell) return;
    todoSelectedDate=cell.dataset.monthDate;
    const d=new Date(todoSelectedDate+'T00:00:00');
    todoCal={year:d.getFullYear(),month:d.getMonth()};
    todoView='daily';
    renderTodo();
  });
}

function initResizer(){
  const resizer=document.getElementById('pane-resizer');
  const pane=document.getElementById('thread-pane');
  if(!resizer||!pane) return;
  resizer.classList.add('visible');
  // clone to remove old listeners
  const fresh=resizer.cloneNode(true);
  resizer.parentNode.replaceChild(fresh,resizer);
  fresh.addEventListener('mousedown',e=>{
    const startX=e.clientX;
    const startW=pane.offsetWidth;
    fresh.classList.add('dragging');
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
    const onMove=e=>{
      const w=Math.max(280,Math.min(1200,startW-(e.clientX-startX)));
      pane.style.transition='none';
      pane.style.width=w+'px';
      localStorage.setItem('thread-pane-width',w);
    };
    const onUp=()=>{
      fresh.classList.remove('dragging');
      document.body.style.cursor='';
      document.body.style.userSelect='';
      pane.style.transition='';
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
    };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
    e.preventDefault();
  });
}

async function openThread(id, type){
  selectedItem={id,type};
  const pane=document.getElementById('thread-pane');
  if(!pane) return;
  const savedW=parseInt(localStorage.getItem('thread-pane-width'))||420;
  pane.style.width=savedW+'px';
  pane.classList.add('open');

  // 헤더 정보 로드
  let item, headerHtml='', metaHtml='';
  if(type==='comm'){
    item=await db.get('communications',id);
    headerHtml=`${esc(item?.date||'')} · ${esc(item?.type||'')}`;
    metaHtml=`<span>👥 ${esc(item?.participants||'')}</span>`;
  } else if(type==='issue'){
    item=await db.get('issues',id);
    const pl={high:'🔴 높음',medium:'🟡 보통',low:'🟢 낮음'};
    headerHtml=esc(item?.title||'');
    metaHtml=`<span>${pl[item?.priority]||''}</span><span>📂 ${esc(item?.category||'')}</span>${item?.assignee?`<span>👤 ${esc(item.assignee)}</span>`:''}`;
  } else if(type==='note'){
    item=await db.get('notes',id);
    headerHtml=esc(item?.title||'(제목 없음)');
  }

  const origContent=item?.content?`<div class="note-rendered">${renderMarkdown(item.content)}</div>`:'';
  const origExtra=type==='comm'&&item?.actionItems?`<div style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px"><label style="font-size:11px;font-weight:600;color:var(--text3)">결정사항</label><div class="note-rendered">${renderMarkdown(item.actionItems)}</div></div>`:'';

  pane.innerHTML=`
    <div class="thread-header">
      <span class="thread-header-title">${headerHtml}</span>
      <button class="thread-close" onclick="closeThread()">✕</button>
    </div>
    ${origContent||metaHtml?`
    <div class="thread-original">
      ${metaHtml?`<div class="thread-original-meta">${metaHtml}</div>`:''}
      ${origContent}${origExtra}
    </div>`:''}
    <div class="thread-messages" id="thread-messages"></div>
    <div class="thread-compose">
      ${makeToolbarHtml('thread-input')}
      <textarea id="thread-input" placeholder="스레드에 내용 추가..."></textarea>
      <div class="thread-compose-row">
        <button class="btn-primary" id="btn-thread-send">전송</button>
      </div>
    </div>
  `;

  attachToolbars(pane);
  document.getElementById('btn-thread-send').addEventListener('click', async()=>{
    const ta=document.getElementById('thread-input');
    const content=ta.value.trim();
    if(!content) return;
    await db.put('threads',{
      id:genId(), parentId:id, projectId:PROJECT_ID,
      content, createdAt:Date.now()
    });
    ta.value='';
    await loadThreadMessages(id);
    // 목록 스크롤 맨 아래로
    const msgs=document.getElementById('thread-messages');
    if(msgs) msgs.scrollTop=msgs.scrollHeight;
  });

  document.getElementById('thread-input').addEventListener('keydown', e=>{
    if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){
      e.preventDefault();
      document.getElementById('btn-thread-send').click();
    }
  });

  await loadThreadMessages(id);
  initResizer();
}

async function loadThreadMessages(parentId){
  const el=document.getElementById('thread-messages');
  if(!el) return;
  const items=await db.getByIndex('threads','parentId',parentId);
  items.sort((a,b)=>a.createdAt-b.createdAt);
  if(!items.length){
    el.innerHTML=`<div class="thread-empty">아직 스레드가 없습니다<br><span style="font-size:12px">아래에 내용을 입력해보세요</span></div>`;
    return;
  }
  el.innerHTML=items.map(t=>`
    <div class="thread-msg" id="thread-msg-${t.id}">
      <div class="thread-msg-meta">
        ${new Date(t.createdAt).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}
        ${t.updatedAt?`<span style="color:var(--text3);font-size:10px;margin-left:4px">(수정됨)</span>`:''}
        <button onclick="editThread('${t.id}')" style="background:none;border:none;cursor:pointer;color:var(--blue);font-size:11px;margin-left:6px;padding:0">수정</button>
        <button onclick="deleteThread('${t.id}')" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;margin-left:4px;padding:0">삭제</button>
      </div>
      <div class="thread-msg-content note-rendered" id="thread-content-${t.id}">${renderMarkdown(t.content)}</div>
    </div>
  `).join('');
}

async function deleteThread(id){
  const item = await db.get('threads', id);
  if(!item) return;
  pushUndo('threads', item, '댓글', async()=>{if(selectedItem) await loadThreadMessages(selectedItem.id);});
  await db.delete('threads', id);
  showToast('삭제됨 · Ctrl+Z로 실행 취소');
  if(selectedItem) await loadThreadMessages(selectedItem.id);
}

async function editThread(id){
  const t=await db.get('threads',id);
  if(!t) return;
  const contentEl=document.getElementById('thread-content-'+id);
  if(!contentEl) return;
  const escaped=( t.content||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  contentEl.innerHTML=`
    <textarea id="thread-edit-${id}" style="width:100%;border:1px solid var(--border2);border-radius:4px;padding:7px 9px;font-family:inherit;font-size:13px;line-height:1.65;color:var(--text);background:var(--bg);resize:vertical;min-height:80px;box-sizing:border-box">${escaped}</textarea>
    <div style="display:flex;justify-content:flex-end;gap:6px;margin-top:6px">
      <button onclick="saveThread('${id}')" class="btn-primary" style="font-size:12px;padding:4px 12px">저장</button>
      <button onclick="cancelThreadEdit()" class="btn-ghost" style="font-size:12px;padding:4px 12px">취소</button>
    </div>
  `;
  document.getElementById('thread-edit-'+id).focus();
}

async function saveThread(id){
  const t=await db.get('threads',id);
  if(!t) return;
  const ta=document.getElementById('thread-edit-'+id);
  if(!ta) return;
  const content=ta.value.trim();
  if(!content){alert('내용을 입력해주세요');return;}
  await db.put('threads',{...t, content, updatedAt:Date.now()});
  if(selectedItem) await loadThreadMessages(selectedItem.id);
}

async function cancelThreadEdit(){
  if(selectedItem) await loadThreadMessages(selectedItem.id);
}

function closeThread(){
  selectedItem=null;
  const pane=document.getElementById('thread-pane');
  if(pane){pane.style.width='0';pane.classList.remove('open');pane.innerHTML='';}
  const resizer=document.getElementById('pane-resizer');
  if(resizer) resizer.classList.remove('visible');
}

// ── MODAL CORE ────────────────────────────────────────────────────
function showModal(title, bodyHtml, buttons=[], preventClose=false, wide=false){
  document.getElementById('modal').classList.toggle('modal-wide', wide);
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=bodyHtml;
  const footer=document.getElementById('modal-footer');
  footer.innerHTML='';
  buttons.forEach(b=>{
    const btn=document.createElement('button');
    btn.className=b.cls||'btn-ghost';
    btn.textContent=b.label;
    btn.addEventListener('click',async()=>{
      const result=await b.action();
      if(result===false) return;
    });
    footer.appendChild(btn);
  });
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('modal-close').style.display=preventClose?'none':'';
  document.getElementById('modal-overlay').dataset.preventClose=preventClose?'1':'';
}
function closeModal(){
  document.getElementById('modal-overlay').classList.add('hidden');
}
function showToast(msg, duration=2500){
  let t=document.getElementById('__toast');
  if(!t){
    t=document.createElement('div');
    t.id='__toast';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:9px 18px;border-radius:8px;font-size:13px;z-index:9999;pointer-events:none;opacity:0;transition:opacity .2s';
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.style.opacity='1';
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>{t.style.opacity='0'},duration);
}
