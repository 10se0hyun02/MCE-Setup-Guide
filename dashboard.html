// ── TODO VIEW FUNCTIONS ────────────────────────────────────────────

async function refreshTodoView(){
  if(todoView==='daily'){ await renderTodoCal(); await loadTodayTodos(); }
  else if(todoView==='weekly'){ await renderTodoWeeklyBody(); }
  else { await renderTodoMonthlyBody(); }
}

function getWeekRange(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const dow=d.getDay();
  const mondayOffset=dow===0?-6:1-dow;
  const mon=new Date(d);
  mon.setDate(d.getDate()+mondayOffset);
  const dates=[];
  for(let i=0;i<7;i++){
    const day=new Date(mon);
    day.setDate(mon.getDate()+i);
    dates.push(day.toISOString().slice(0,10));
  }
  return dates; // [월,화,수,목,금,토,일]
}

async function renderTodoWeeklyBody(){
  const body=document.getElementById('todo-view-body');
  if(!body) return;
  body.style.overflow='hidden';

  const allTodos=await db.getByIndex('todos','projectId',PROJECT_ID);
  const todayStr=new Date().toISOString().slice(0,10);
  const weekDates=getWeekRange(todoSelectedDate);
  const DAY_LABELS=['월','화','수','목','금','토','일'];

  const colsHtml=weekDates.map((ds,idx)=>{
    const isToday=ds===todayStr;
    const isWeekend=idx>=5;
    const d=new Date(ds+'T00:00:00');
    const dayItems=allTodos.filter(t=>t.date===ds).sort((a,b)=>a.createdAt-b.createdAt);
    const itemsHtml=dayItems.map(t=>`
      <div class="todo-week-card${t.done?' done-card':''}" data-week-todo-id="${t.id}">
        ${esc(t.content)}
      </div>`).join('');
    return `
      <div class="todo-week-col${isWeekend?' weekend':''}">
        <div class="todo-week-col-header${isToday?' today-col':''}">
          <div class="todo-week-dow">${DAY_LABELS[idx]}</div>
          <div class="todo-week-date${isToday?' today-date':''}">${d.getMonth()+1}/${d.getDate()}</div>
        </div>
        <div class="todo-week-items" id="week-items-${ds}">${itemsHtml}</div>
        <button class="todo-week-add" data-week-add="${ds}">+ 추가</button>
      </div>`;
  }).join('');

  const monD=new Date(weekDates[0]+'T00:00:00');
  const sunD=new Date(weekDates[6]+'T00:00:00');
  const weekLabel=`${monD.getFullYear()}년 ${monD.getMonth()+1}월 ${monD.getDate()}일 ~ ${sunD.getMonth()+1}월 ${sunD.getDate()}일`;

  body.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-shrink:0">
      <button class="cal-nav" id="week-prev">‹</button>
      <span style="font-weight:700;font-size:14px;color:var(--text)">${weekLabel}</span>
      <button class="cal-nav" id="week-next">›</button>
      <button class="btn-ghost" id="week-today" style="margin-left:auto;font-size:12px">오늘</button>
    </div>
    <div class="todo-weekly-grid">${colsHtml}</div>`;

  document.getElementById('week-prev').addEventListener('click',()=>{
    const prev=new Date(weekDates[0]+'T00:00:00');
    prev.setDate(prev.getDate()-7);
    todoSelectedDate=prev.toISOString().slice(0,10);
    renderTodoWeeklyBody();
  });
  document.getElementById('week-next').addEventListener('click',()=>{
    const next=new Date(weekDates[0]+'T00:00:00');
    next.setDate(next.getDate()+7);
    todoSelectedDate=next.toISOString().slice(0,10);
    renderTodoWeeklyBody();
  });
  document.getElementById('week-today').addEventListener('click',()=>{
    todoSelectedDate=new Date().toISOString().slice(0,10);
    renderTodoWeeklyBody();
  });

  body.addEventListener('click',async e=>{
    const addBtn=e.target.closest('[data-week-add]');
    if(addBtn){await quickAddWeeklyTodo(addBtn.dataset.weekAdd);return;}
    const card=e.target.closest('[data-week-todo-id]');
    if(card){await editTodoModal(card.dataset.weekTodoId);return;}
  });
}

async function quickAddWeeklyTodo(dateStr){
  const itemsEl=document.getElementById('week-items-'+dateStr);
  if(!itemsEl||itemsEl.querySelector('.week-quick-input')) return;
  let saved=false;
  const inp=document.createElement('input');
  inp.type='text';
  inp.className='week-quick-input';
  inp.placeholder='할 일 입력 후 Enter';
  inp.style.cssText='width:100%;padding:5px 8px;font-size:12px;border:1px solid var(--blue);border-radius:4px;background:var(--bg);color:var(--text);font-family:inherit;outline:none;margin-top:4px;box-sizing:border-box';
  itemsEl.appendChild(inp);
  inp.focus();
  const save=async()=>{
    if(saved) return;
    saved=true;
    const content=inp.value.trim();
    if(content){
      await db.put('todos',{
        id:genId(),projectId:PROJECT_ID,date:dateStr,
        content,time:'',assignee:'',deadline:'',memo:'',
        done:false,createdAt:Date.now()
      });
    }
    await renderTodoWeeklyBody();
  };
  inp.addEventListener('keydown',async e=>{
    if(e.key==='Enter'){e.preventDefault();await save();}
    if(e.key==='Escape'){saved=true;inp.remove();}
  });
  inp.addEventListener('blur',save);
}

async function renderTodoMonthlyBody(){
  const body=document.getElementById('todo-view-body');
  if(!body) return;
  body.style.overflowY='auto';

  const allTodos=await db.getByIndex('todos','projectId',PROJECT_ID);
  const todayStr=new Date().toISOString().slice(0,10);
  const {year,month}=todoCal;
  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const firstDow=new Date(year,month,1).getDay();
  const lastDate=new Date(year,month+1,0).getDate();

  const todoMap={};
  allTodos.forEach(t=>{
    if(!todoMap[t.date]) todoMap[t.date]=[];
    todoMap[t.date].push(t);
  });

  let cellsHtml='';
  for(let i=0;i<firstDow;i++) cellsHtml+=`<div class="todo-month-cell empty"></div>`;
  for(let d=1;d<=lastDate;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===todayStr;
    const dayTodos=(todoMap[ds]||[]).sort((a,b)=>a.createdAt-b.createdAt);
    const MAX=3;
    const previewHtml=dayTodos.slice(0,MAX).map(t=>
      `<div class="todo-month-item-preview${t.done?' done-preview':''}">${esc(t.content)}</div>`
    ).join('');
    const moreCount=dayTodos.length-MAX;
    const moreHtml=moreCount>0?`<div class="todo-month-more">+${moreCount}건</div>`:'';
    cellsHtml+=`
      <div class="todo-month-cell${isToday?' today-cell':''}" data-month-date="${ds}">
        <div class="todo-month-day-num">${d}</div>
        ${previewHtml}${moreHtml}
      </div>`;
  }
  const totalCells=firstDow+lastDate;
  const remainder=(7-totalCells%7)%7;
  for(let i=0;i<remainder;i++) cellsHtml+=`<div class="todo-month-cell empty"></div>`;

  body.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-shrink:0">
      <button class="cal-nav" id="month-prev">‹</button>
      <span style="font-weight:700;font-size:15px;color:var(--text)">${year}년 ${monthNames[month]}</span>
      <button class="cal-nav" id="month-next">›</button>

  });

    if(todoCal.month===11) todoCal={year:todoCal.year+1,month:0};

    renderTodoMonthlyBody();
  });

    todoCal={year:new Date().getFullYear(),month:new Date().getMonth()};

    todoView='daily';
    renderTodo();
  });
}

function initResizer(){
  const resizer=document.getElementById('pane-resizer');
  const pane=document.getElementById('thread-pane');
  if(!resizer||!pane) return;
  resizer.classList.add('visible');
  // clone to remove old listeners
  const fresh=resizer.cloneNode(true);
  resizer.parentNode.replaceChild(fresh,resizer);
  fresh.addEventListener('mousedown',e=>{
    const startX=e.clientX;
    const startW=pane.offsetWidth;
    fresh.classList.add('dragging');
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
    const onMove=e=>{
      const w=Math.max(280,Math.min(1200,startW-(e.clientX-startX)));
      pane.style.transition='none';
      pane.style.width=w+'px';
      localStorage.setItem('thread-pane-width',w);
    };
    const onUp=()=>{
      fresh.classList.remove('dragging');
      document.body.style.cursor='';
      document.body.style.userSelect='';
      pane.style.transition='';
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
    };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
    e.preventDefault();
  });
}

async function openThread(id, type){
  selectedItem={id,type};
  const pane=document.getElementById('thread-pane');
  if(!pane) return;
  const savedW=parseInt(localStorage.getItem('thread-pane-width'))||420;
  pane.style.width=savedW+'px';
  pane.classList.add('open');

  // 헤더 정보 로드
  let item, headerHtml='', metaHtml='';
  if(type==='comm'){
    item=await db.get('communications',id);
    headerHtml=`${esc(item?.date||'')} · ${esc(item?.type||'')}`;
    metaHtml=`<span>👥 ${esc(item?.participants||'')}</span>`;
  } else if(type==='issue'){
    item=await db.get('issues',id);
    const pl={high:'🔴 높음',medium:'🟡 보통',low:'🟢 낮음'};
    headerHtml=esc(item?.title||'');
    metaHtml=`<span>${pl[item?.priority]||''}</span><span>📂 ${esc(item?.category||'')}</span>${item?.assignee?`<span>👤 ${esc(item.assignee)}</span>`:''}`;
  } else if(type==='note'){
    item=await db.get('notes',id);
    headerHtml=esc(item?.title||'(제목 없음)');
  }

  const origContent=item?.content?`<div class="note-rendered">${renderMarkdown(item.content)}</div>`:'';
  const origExtra=type==='comm'&&item?.actionItems?`<div style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px"><label style="font-size:11px;font-weight:600;color:var(--text3)">결정사항</label><div class="note-rendered">${renderMarkdown(item.actionItems)}</div></div>`:'';

  pane.innerHTML=`
    <div class="thread-header">
      <span class="thread-header-title">${headerHtml}</span>
      <button class="thread-close" onclick="closeThread()">✕</button>
    </div>
    ${origContent||metaHtml?`
    <div class="thread-original">
      ${metaHtml?`<div class="thread-original-meta">${metaHtml}</div>`:''}
      ${origContent}${origExtra}
    </div>`:''}
    <div class="thread-messages" id="thread-messages"></div>
    <div class="thread-compose">
      <textarea id="thread-input" placeholder="스레드에 내용 추가..."></textarea>
      <div class="thread-compose-row">
        <button class="btn-primary" id="btn-thread-send">전송</button>
      </div>
    </div>
  `;

  document.getElementById('btn-thread-send').addEventListener('click', async()=>{
    const ta=document.getElementById('thread-input');
    const content=ta.value.trim();
    if(!content) return;
    await db.put('threads',{
      id:genId(), parentId:id, projectId:PROJECT_ID,
      content, createdAt:Date.now()
    });
    ta.value='';
    await loadThreadMessages(id);
    // 목록 스크롤 맨 아래로
    const msgs=document.getElementById('thread-messages');
    if(msgs) msgs.scrollTop=msgs.scrollHeight;
  });

  document.getElementById('thread-input').addEventListener('keydown', e=>{
    if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){
      e.preventDefault();
      document.getElementById('btn-thread-send').click();
    }
  });

  await loadThreadMessages(id);
  initResizer();
}

async function loadThreadMessages(parentId){
  const el=document.getElementById('thread-messages');
  if(!el) return;
  const items=await db.getByIndex('threads','parentId',parentId);
  items.sort((a,b)=>a.createdAt-b.createdAt);
  if(!items.length){
    el.innerHTML=`<div class="thread-empty">아직 스레드가 없습니다<br><span style="font-size:12px">아래에 내용을 입력해보세요</span></div>`;
    return;
  }
  el.innerHTML=items.map(t=>`
    <div class="thread-msg">
      <div class="thread-msg-meta">
        ${new Date(t.createdAt).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}
        <button onclick="deleteThread('${t.id}')" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;margin-left:6px;padding:0">삭제</button>
      </div>
      <div class="thread-msg-content note-rendered">${renderMarkdown(t.content)}</div>
    </div>
  `).join('');
}

async function deleteThread(id){
  if(!confirm('이 스레드를 삭제하시겠습니까?')) return;
  await db.delete('threads',id);
  if(selectedItem) await loadThreadMessages(selectedItem.id);
}

function closeThread(){
  selectedItem=null;
  const pane=document.getElementById('thread-pane');
  if(pane){pane.style.width='0';pane.classList.remove('open');pane.innerHTML='';}
  const resizer=document.getElementById('pane-resizer');
  if(resizer) resizer.classList.remove('visible');
}

function showModal(title, bodyHtml, buttons=[], preventClose=false, wide=false){
  document.getElementById('modal').classList.toggle('modal-wide', wide);
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=bodyHtml;
  const footer=document.getElementById('modal-footer');
  footer.innerHTML='';
  buttons.forEach(b=>{
    const btn=document.createElement('button');
    btn.className=b.cls||'btn-ghost';
    btn.textContent=b.label;
    btn.addEventListener('click',async()=>{
      const result=await b.action();
      if(result===false) return;
    });
    footer.appendChild(btn);
  });
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('modal-close').style.display=preventClose?'none':'';
  document.getElementById('modal-overlay').dataset.preventClose=preventClose?'1':'';
}
function closeModal(){
  document.getElementById('modal-overlay').classList.add('hidden');
}
function showToast(msg, duration=2500){
  let t=document.getElementById('__toast');
  if(!t){
    t=document.createElement('div');
    t.id='__toast';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:9px 18px;border-radius:8px;font-size:13px;z-index:9999;pointer-events:none;opacity:0;transition:opacity .2s';

  }
  t.textContent=msg;
  t.style.opacity='1';
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>{t.style.opacity='0'},duration);
}

let gsearchFocusIdx = -1;

function gsHighlight(text, query){
  if(!text) return '';
  if(!query) return esc(text);
  const idx = String(text).toLowerCase().indexOf(query.toLowerCase());
  if(idx < 0) return esc(text);
  const t = String(text);
  return esc(t.slice(0,idx))
    + `<span class="gsearch-highlight">${esc(t.slice(idx, idx+query.length))}</span>`
    + esc(t.slice(idx+query.length));
}

async function runGlobalSearch(query){
  const q = query.toLowerCase().trim();
  if(!q) return [];
  const results = [];

  const comms = await db.getByIndex('communications','projectId',PROJECT_ID);
  comms.forEach(c=>{
    const fields = [c.content, c.participants, c.type, c.date];
    if(fields.some(f=>(f||'').toLowerCase().includes(q))){
      const matchIn = (c.participants||'').toLowerCase().includes(q) ? '참석자 일치'
        : (c.date||'').includes(q) ? '날짜 일치' : '내용 일치';
      results.push({
        tab:'comm', threadType:'comm', icon:'💬', section:'커뮤니케이션',
        title:`${c.date} · ${c.type}`,
        meta:`${c.participants||''}  ·  ${matchIn}`,
        preview:(c.content||'').replace(/\n/g,' ').slice(0,80),
        id:c.id,
      });
    }
  });

  const files = await db.getByIndex('files','projectId',PROJECT_ID);
  files.forEach(f=>{
    if((f.name||'').toLowerCase().includes(q)||(f.category||'').toLowerCase().includes(q)){
      results.push({
        tab:'files', icon:'📎', section:'파일',
        title:f.name,
        meta:`${f.category} · ${fmtSize(f.size)}`,
        id:f.id,
      });
    }
  });

  const issues = await db.getByIndex('issues','projectId',PROJECT_ID);
  issues.forEach(i=>{
    const fields = [i.title, i.content, i.assignee, i.category];
    if(fields.some(f=>(f||'').toLowerCase().includes(q))){
      const pl={high:'🔴 높음',medium:'🟡 보통',low:'🟢 낮음'};
      const matchIn = (i.title||'').toLowerCase().includes(q) ? '제목 일치'
        : (i.assignee||'').toLowerCase().includes(q) ? '담당자 일치' : '내용 일치';
      results.push({
        tab:'issues', threadType:'issue', icon:'⚠️', section:'이슈',
        title:i.title,
        meta:`${pl[i.priority]||''} · ${i.category} · ${matchIn}`,
        preview:(i.content||'').replace(/\n/g,' ').slice(0,80),
        id:i.id,
      });
    }
  });

  const notes = await db.getByIndex('notes','projectId',PROJECT_ID);
  notes.forEach(n=>{
    if((n.title||'').toLowerCase().includes(q)||(n.content||'').toLowerCase().includes(q)){
      const matchIn = (n.title||'').toLowerCase().includes(q) ? '제목 일치' : '내용 일치';
      results.push({
        tab:'notes', threadType:'note', icon:'📝', section:'노트',
        title:n.title||'(제목 없음)',
        meta:`${new Date(n.updatedAt).toLocaleDateString('ko-KR')} · ${matchIn}`,
        preview:(n.content||'').replace(/\n/g,' ').slice(0,80),
        id:n.id,
      });
    }
  });

  const todos = await db.getByIndex('todos','projectId',PROJECT_ID);
  todos.forEach(t=>{
    if([t.content,t.memo,t.assignee].some(f=>(f||'').toLowerCase().includes(q))){
      results.push({
        tab:'todo', icon:'📅', section:'할일',
        title:t.content,
        meta:`${t.date}${t.done?' · ✅ 완료':''}${t.assignee?' · '+t.assignee:''}`,
        id:t.id,
        date:t.date,
      });
    }
  });

  return results;
}

async function renderGsearchResults(query){
  const el = document.getElementById('gsearch-results');
  if(!el) return;
  gsearchFocusIdx = -1;

  if(!query.trim()){
    el.innerHTML = '<div class="gsearch-empty">검색어를 입력하세요</div>';
    return;
  }

  const results = await runGlobalSearch(query);

  if(!results.length){
    el.innerHTML = `<div class="gsearch-empty">"${esc(query)}" 검색 결과가 없습니다</div>`;
    return;
  }

  const sections = {};
  results.forEach(r=>{
    if(!sections[r.section]) sections[r.section]=[];
    sections[r.section].push(r);
  });

  let html = '';
  const sectionOrder = ['커뮤니케이션','파일','이슈','노트','할일'];
  sectionOrder.forEach(sec=>{
    const items = sections[sec];
    if(!items) return;
    html += `<div class="gsearch-section-label">${esc(sec)} <span style="font-weight:400;letter-spacing:0">(${items.length})</span></div>`;
    items.forEach(r=>{
      const titleHtml = gsHighlight(r.title, query);
      const previewText = r.preview ? r.preview : '';
      const previewHtml = previewText ? gsHighlight(previewText, query) : '';
      const metaStr = r.meta || '';
      html += `
        <div class="gsearch-item" data-gtab="${esc(r.tab)}" data-gid="${esc(r.id)}" data-gtype="${esc(r.threadType||'')}" data-gdate="${esc(r.date||'')}">
          <span class="gsearch-item-icon">${r.icon}</span>
          <div class="gsearch-item-body">
            <div class="gsearch-item-title">${titleHtml}</div>
            <div class="gsearch-item-meta">${esc(metaStr)}${previewHtml?' — '+previewHtml:''}</div>
          </div>
          <span class="gsearch-item-badge">${esc(sec)}</span>
        </div>`;
    });
  });

  el.innerHTML = html;
}

function gsearchGo(item){
  const tab = item.dataset.gtab;
  const id = item.dataset.gid;
  const type = item.dataset.gtype;
  const date = item.dataset.gdate;
  closeGlobalSearch();
  renderTab(tab);
  if(type && ['comm','issue','note'].includes(type)){
    setTimeout(()=>openThread(id, type), 150);
  } else if(tab==='todo' && date){
    todoSelectedDate = date;
    todoView = 'daily';
    setTimeout(()=>renderTodo(), 50);
  }
}

// ── EVENT LISTENERS ───────────────────────────────────────────────
document.getElementById('tab-nav').addEventListener('click', e=>{
  const btn=e.target.closest('button');
  if(btn&&btn.dataset.tab) renderTab(btn.dataset.tab);
});
document.getElementById('btn-edit-proj').addEventListener('click',()=>showProjectModal(false));
document.getElementById('btn-agent-settings').addEventListener('click',openAgentSettings);
document.getElementById('btn-export').addEventListener('click',exportData);
document.getElementById('btn-import').addEventListener('click',()=>document.getElementById('import-input').click());
document.getElementById('import-input').addEventListener('change',e=>{
  importData(e.target.files[0]);
  e.target.value='';
});
document.getElementById('modal-overlay').addEventListener('click', e=>{
  if(e.target===document.getElementById('modal-overlay')&&e.target.dataset.preventClose!=='1') closeModal();
});
document.getElementById('modal-close').addEventListener('click', closeModal);

// global search
document.getElementById('btn-global-search').addEventListener('click', openGlobalSearch);
document.getElementById('gsearch-close-kbd').addEventListener('click', closeGlobalSearch);
document.getElementById('gsearch-overlay').addEventListener('click', e=>{
  if(e.target===document.getElementById('gsearch-overlay')) closeGlobalSearch();
});
document.getElementById('gsearch-input').addEventListener('input', e=>{
  renderGsearchResults(e.target.value);
});
document.getElementById('gsearch-input').addEventListener('keydown', e=>{
  const items = document.querySelectorAll('.gsearch-item');
  if(e.key==='ArrowDown'){
    e.preventDefault();
    gsearchFocusIdx = Math.min(gsearchFocusIdx+1, items.length-1);
    items.forEach((el,i)=>el.classList.toggle('focused',i===gsearchFocusIdx));
    if(items[gsearchFocusIdx]) items[gsearchFocusIdx].scrollIntoView({block:'nearest'});
  } else if(e.key==='ArrowUp'){
    e.preventDefault();
    gsearchFocusIdx = Math.max(gsearchFocusIdx-1, 0);
    items.forEach((el,i)=>el.classList.toggle('focused',i===gsearchFocusIdx));
    if(items[gsearchFocusIdx]) items[gsearchFocusIdx].scrollIntoView({block:'nearest'});
  } else if(e.key==='Enter'){
    const focused = items[gsearchFocusIdx];
    if(focused) gsearchGo(focused);
  } else if(e.key==='Escape'){
    closeGlobalSearch();
  }
});
document.getElementById('gsearch-results').addEventListener('click', e=>{
  const item = e.target.closest('.gsearch-item');
  if(item) gsearchGo(item);
});
document.addEventListener('keydown', e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){
    e.preventDefault();
    openGlobalSearch();
  }
});

// ── THEME ─────────────────────────────────────────────────────────
function applyTheme(theme){
  document.documentElement.dataset.theme = theme;
  document.getElementById('btn-theme').dataset.theme = theme;
}
function getSystemTheme(){
  return window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
}
(function initTheme(){
  const saved = localStorage.getItem('mce-theme');
  applyTheme(saved || getSystemTheme());
})();
document.getElementById('btn-theme').addEventListener('click',()=>{
  const next = document.documentElement.dataset.theme==='dark' ? 'light' : 'dark';
  applyTheme(next);
  localStorage.setItem('mce-theme', next);
});

// ── START ────────────────────────────────────────────────────────
init();
</script>
