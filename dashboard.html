<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCE 업무 대시보드</title>
<style>
/* ── Tokyo Night ── */
:root {
  --blue:#2e7de9; --blue-bg:#dce8fb; --blue-text:#2e7de9;
  --green:#587539; --green-bg:#ddeec8;
  --amber:#8c6c3e; --amber-bg:#f0e4cc;
  --red:#c64343; --red-bg:#f9dede;
  --bg:#f5f5fa; --bg2:#ebebf2; --bg3:#e0e1ea;
  --text:#343b58; --text2:#6172b0; --text3:#9699b4;
  --border:rgba(52,59,88,.1); --border2:rgba(52,59,88,.2);
  --radius:8px; --radius-lg:12px;
  --header-h:60px; --tab-h:44px;
}
@media (prefers-color-scheme:dark){
  :root:not([data-theme="light"]){
    --blue:#7aa2f7; --blue-bg:#1a2744; --blue-text:#7aa2f7;
    --green:#9ece6a; --green-bg:#1a2b14;
    --amber:#e0af68; --amber-bg:#2b200f;
    --red:#f7768e; --red-bg:#2b1520;
    --bg:#1a1b2e; --bg2:#1f2335; --bg3:#24283b;
    --text:#c0caf5; --text2:#a9b1d6; --text3:#565f89;
    --border:rgba(86,95,137,.18); --border2:rgba(86,95,137,.35);
  }
}
[data-theme="dark"]{
  --blue:#7aa2f7; --blue-bg:#1a2744; --blue-text:#7aa2f7;
  --green:#9ece6a; --green-bg:#1a2b14;
  --amber:#e0af68; --amber-bg:#2b200f;
  --red:#f7768e; --red-bg:#2b1520;
  --bg:#1a1b2e; --bg2:#1f2335; --bg3:#24283b;
  --text:#c0caf5; --text2:#a9b1d6; --text3:#565f89;
  --border:rgba(86,95,137,.18); --border2:rgba(86,95,137,.35);
}
[data-theme="light"]{
  --blue:#2e7de9; --blue-bg:#dce8fb; --blue-text:#2e7de9;
  --green:#587539; --green-bg:#ddeec8;
  --amber:#8c6c3e; --amber-bg:#f0e4cc;
  --red:#c64343; --red-bg:#f9dede;
  --bg:#f5f5fa; --bg2:#ebebf2; --bg3:#e0e1ea;
  --text:#343b58; --text2:#6172b0; --text3:#9699b4;
  --border:rgba(52,59,88,.1); --border2:rgba(52,59,88,.2);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:system-ui,-apple-system,'Noto Sans KR',sans-serif;
  font-size:14px;line-height:1.6;
  color:var(--text);background:var(--bg);
  display:flex;flex-direction:column;
}

/* ── HEADER ── */
#app-header{
  height:var(--header-h);min-height:var(--header-h);
  background:var(--bg);border-bottom:1px solid var(--border2);
  display:flex;align-items:center;padding:0 20px;gap:12px;
  flex-shrink:0;
}
#app-header .brand{font-weight:700;font-size:15px;color:var(--blue);white-space:nowrap}
#proj-info{flex:1;display:flex;align-items:center;gap:10px;min-width:0;overflow:hidden}
#proj-name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
#proj-meta{color:var(--text3);font-size:12px;white-space:nowrap;display:flex;gap:8px}
.meta-item{display:flex;align-items:center;gap:3px}
#btn-edit-proj{
  background:none;border:1px solid var(--border2);color:var(--text2);
  border-radius:6px;padding:3px 8px;font-size:12px;cursor:pointer;white-space:nowrap;
}
#btn-edit-proj:hover{background:var(--bg2)}
.header-actions{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.header-actions a,.header-actions button{
  background:none;border:1px solid var(--border2);color:var(--text2);
  border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;
  text-decoration:none;white-space:nowrap;
}
.header-actions a:hover,.header-actions button:hover{background:var(--bg2)}
#btn-theme{
  width:36px;height:20px;border-radius:99px;padding:0;
  background:var(--bg3);border:1px solid var(--border2);
  position:relative;flex-shrink:0;transition:background .2s;
}
#btn-theme::after{
  content:'';position:absolute;top:3px;left:3px;
  width:12px;height:12px;border-radius:50%;
  background:var(--text3);transition:transform .2s, background .2s;
}
#btn-theme[data-theme="dark"]{background:var(--blue);border-color:var(--blue)}
#btn-theme[data-theme="dark"]::after{transform:translateX(16px);background:#fff}
#btn-theme:hover{opacity:.85}
#btn-agent-settings{border-color:var(--amber);color:var(--amber)}
#btn-agent-settings:hover{background:var(--amber-bg)}
#btn-export{border-color:var(--blue);color:var(--blue-text)}
#btn-export:hover{background:var(--blue-bg)}

/* ── TAB NAV ── */
#tab-nav{
  height:var(--tab-h);min-height:var(--tab-h);
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:stretch;padding:0 16px;gap:4px;
  flex-shrink:0;overflow-x:auto;
}
#tab-nav button{
  background:none;border:none;border-bottom:2px solid transparent;
  padding:0 14px;font-size:13px;font-weight:500;color:var(--text2);
  cursor:pointer;white-space:nowrap;margin-bottom:-1px;
}
#tab-nav button:hover{color:var(--text)}
#tab-nav button.active{color:var(--blue);border-bottom-color:var(--blue)}

/* ── TAB CONTENT ── */
#tab-content{flex:1;display:flex;overflow:hidden}
.list-pane{flex:1;overflow-y:auto;padding:20px;min-width:0}
/* ── THREAD PANE ── */
.thread-pane{
  width:0;min-width:0;overflow:hidden;flex-shrink:0;
  border-left:none;
  display:flex;flex-direction:column;
  background:var(--bg);
  transition:width .2s ease;
}
.thread-pane.open{border-left:1px solid var(--border2)}
.pane-resizer{
  width:0;flex-shrink:0;cursor:col-resize;
  background:var(--border2);position:relative;
  transition:width .2s ease, background .15s;
  user-select:none;
}
.pane-resizer.visible{width:4px}
.pane-resizer.visible:hover,.pane-resizer.dragging{background:var(--blue)}
.pane-resizer::after{
  content:'';position:absolute;
  top:0;bottom:0;left:-6px;right:-6px;
}
.thread-header{
  display:flex;align-items:center;gap:10px;
  padding:13px 16px;border-bottom:1px solid var(--border);
  background:var(--bg2);flex-shrink:0;
}
.thread-header-title{font-weight:600;font-size:14px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.thread-close{background:none;border:none;cursor:pointer;font-size:16px;color:var(--text3);padding:2px 6px;border-radius:4px}
.thread-close:hover{background:var(--bg3);color:var(--text)}
.thread-original{
  padding:14px 16px;border-bottom:1px solid var(--border);
  background:var(--bg2);flex-shrink:0;max-height:220px;overflow-y:auto;
}
.thread-original-meta{font-size:11px;color:var(--text3);margin-bottom:8px;display:flex;gap:8px;flex-wrap:wrap}
.thread-messages{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.thread-msg{background:var(--bg2);border-radius:var(--radius);padding:10px 12px}
.thread-msg-meta{font-size:11px;color:var(--text3);margin-bottom:4px}
.thread-empty{text-align:center;padding:30px 0;color:var(--text3);font-size:13px}
.thread-compose{
  padding:12px 16px;border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:8px;flex-shrink:0;
}
.thread-compose textarea{
  width:100%;border:1px solid var(--border2);border-radius:var(--radius);
  padding:8px 10px;font-family:inherit;font-size:13px;line-height:1.6;
  color:var(--text);background:var(--bg);resize:none;min-height:68px;
}
.thread-compose textarea:focus{outline:none;border-color:var(--blue)}
.thread-compose-row{display:flex;justify-content:flex-end}
.thread-trigger{cursor:pointer}
.thread-trigger:hover{color:var(--blue)}
.card-selected{outline:2px solid var(--blue);outline-offset:-1px}

/* ── PROGRESS TAB ── */
.progress-header{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.progress-bar-wrap{flex:1;background:var(--bg3);border-radius:99px;height:8px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--blue);border-radius:99px;transition:width .3s}
.progress-label{font-size:13px;color:var(--text2);white-space:nowrap}
.step-group{margin-bottom:24px}
.step-group-title{
  font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--text3);margin-bottom:8px;padding-bottom:6px;
  border-bottom:1px solid var(--border);
}
.step-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--bg);
  margin-bottom:6px;
}
.step-item:hover{border-color:var(--border2)}
.step-num{font-size:11px;color:var(--text3);min-width:40px;font-weight:500}
.step-toggle{
  font-size:18px;cursor:pointer;line-height:1;
  background:none;border:none;padding:0;
  transition:transform .15s;
}
.step-toggle:hover{transform:scale(1.1)}
.step-title{flex:1;font-weight:500}
.step-status-badge{
  font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;
}
.step-status-badge.pending{background:var(--bg3);color:var(--text3)}
.step-status-badge.in-progress{background:var(--blue-bg);color:var(--blue-text)}
.step-status-badge.done{background:var(--green-bg);color:var(--green)}
.step-guide-link{
  font-size:11px;color:var(--blue);text-decoration:none;white-space:nowrap;
}
.step-guide-link:hover{text-decoration:underline}

/* ── COMM TAB ── */
.tab-toolbar{display:flex;gap:8px;margin-bottom:16px;align-items:center}
.tab-toolbar input[type=text]{
  flex:1;padding:7px 12px;border:1px solid var(--border2);
  border-radius:var(--radius);background:var(--bg);color:var(--text);
  font-size:13px;
}
.tab-toolbar input[type=text]:focus{outline:none;border-color:var(--blue)}
.btn-primary{
  background:var(--blue);color:#fff;border:none;
  border-radius:var(--radius);padding:7px 14px;font-size:13px;
  cursor:pointer;white-space:nowrap;font-weight:500;
}
.btn-primary:hover{opacity:.9}
.btn-ghost{
  background:none;border:1px solid var(--border2);color:var(--text2);
  border-radius:var(--radius);padding:6px 12px;font-size:12px;cursor:pointer;
}
.btn-ghost:hover{background:var(--bg2)}
.comm-list{display:flex;flex-direction:column;gap:10px}
.comm-card{
  border:1px solid var(--border);border-radius:var(--radius-lg);
  background:var(--bg);overflow:hidden;
}
.comm-card-header{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border);
}
.comm-date{font-weight:600;font-size:13px}
.comm-type-badge{
  font-size:11px;padding:2px 8px;border-radius:99px;
  background:var(--blue-bg);color:var(--blue-text);font-weight:500;
}
.comm-participants{font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-actions{display:flex;gap:4px}
.card-actions button{
  background:none;border:none;cursor:pointer;
  font-size:14px;padding:2px 5px;border-radius:4px;
  color:var(--text3);
}
.card-actions button:hover{background:var(--bg3);color:var(--text)}
.comm-card-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.comm-field label{font-size:11px;font-weight:600;color:var(--text3);display:block;margin-bottom:2px}
.comm-field p{font-size:13px;line-height:1.6;color:var(--text)}
.empty-state{
  text-align:center;padding:60px 20px;color:var(--text3);
}
.empty-state p{font-size:15px;margin-bottom:6px}
.empty-state span{font-size:13px}

/* ── FILES TAB ── */
.file-upload-zone{
  border:2px dashed var(--border2);border-radius:var(--radius-lg);
  padding:30px;text-align:center;margin-bottom:20px;
  cursor:pointer;transition:border-color .2s,background .2s;
}
.file-upload-zone:hover,.file-upload-zone.drag-over{
  border-color:var(--blue);background:var(--blue-bg);
}
.file-upload-zone p{color:var(--text2);font-size:13px}
.file-upload-zone span{font-size:12px;color:var(--text3)}
#file-input{display:none}
.file-category-filter{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{
  background:none;border:1px solid var(--border2);color:var(--text2);
  border-radius:99px;padding:3px 10px;font-size:12px;cursor:pointer;
}
.filter-btn.active,.filter-btn:hover{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue)}
.file-list{display:flex;flex-direction:column;gap:6px}
.file-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border:1px solid var(--border);
  border-radius:var(--radius);background:var(--bg);
}
.file-icon{font-size:20px}
.file-info{flex:1;min-width:0}
.file-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-meta{font-size:11px;color:var(--text3);display:flex;gap:8px}
.file-cat-badge{
  font-size:11px;padding:1px 7px;border-radius:99px;
  background:var(--bg3);color:var(--text2);
}

/* ── ISSUES TAB ── */
.issue-filter-tabs{display:flex;gap:4px;margin-bottom:14px}
.issue-filter-tabs button{
  background:none;border:1px solid var(--border2);color:var(--text2);
  border-radius:99px;padding:4px 12px;font-size:12px;cursor:pointer;
}
.issue-filter-tabs button.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.issue-list{display:flex;flex-direction:column;gap:8px}
.issue-card{
  border:1px solid var(--border);border-radius:var(--radius-lg);
  background:var(--bg);padding:14px;
}
.issue-card.high{border-left:3px solid var(--red)}
.issue-card.medium{border-left:3px solid var(--amber)}
.issue-card.low{border-left:3px solid var(--green)}
.issue-card-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.issue-title{font-weight:600;font-size:14px;flex:1}
.priority-badge{
  font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;white-space:nowrap;
}
.priority-badge.high{background:var(--red-bg);color:var(--red)}
.priority-badge.medium{background:var(--amber-bg);color:var(--amber)}
.priority-badge.low{background:var(--green-bg);color:var(--green)}
.status-select{
  font-size:11px;padding:2px 6px;border-radius:99px;cursor:pointer;
  border:1px solid var(--border2);background:var(--bg);color:var(--text2);
}
.issue-meta{display:flex;gap:10px;font-size:11px;color:var(--text3);margin-bottom:6px}
.issue-content{font-size:13px;color:var(--text2);line-height:1.6}

/* ── NOTES TAB ── */
.note-card{
  border:1px solid var(--border);border-radius:var(--radius-lg);
  background:var(--bg);overflow:hidden;margin-bottom:10px;
}
.note-card-header{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border);
}
.note-card-title{font-weight:600;font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.note-card-date{font-size:11px;color:var(--text3);white-space:nowrap}
.note-card-body{padding:12px 14px;max-height:120px;overflow:hidden;position:relative}
.note-card-body.expanded{max-height:none}
.note-card-fade{
  position:absolute;bottom:0;left:0;right:0;height:40px;
  background:linear-gradient(transparent,var(--bg));
  pointer-events:none;
}
.note-card-body.expanded .note-card-fade{display:none}
.note-expand-btn{
  background:none;border:none;color:var(--blue);font-size:12px;
  cursor:pointer;padding:4px 14px 10px;display:block;width:100%;text-align:left;
}
#note-modal-textarea{
  width:100%;border:1px solid var(--border2);
  border-radius:0 0 var(--radius) var(--radius);
  padding:12px;font-family:'Noto Sans KR',system-ui,sans-serif;font-size:13px;line-height:1.7;
  color:var(--text);background:var(--bg);resize:vertical;min-height:220px;
}
#note-modal-textarea:focus{outline:none;border-color:var(--blue)}
.note-toolbar{
  display:flex;align-items:center;gap:2px;flex-wrap:wrap;
  padding:5px 7px;background:var(--bg2);
  border:1px solid var(--border2);border-bottom:none;
  border-radius:var(--radius) var(--radius) 0 0;
}
.note-toolbar button{
  background:none;border:none;cursor:pointer;
  padding:3px 7px;border-radius:4px;
  font-size:12px;color:var(--text2);line-height:1.5;
  white-space:nowrap;
}
.note-toolbar button:hover{background:var(--bg3);color:var(--text)}
.note-toolbar .tb-sep{width:1px;height:14px;background:var(--border2);margin:0 3px;flex-shrink:0}
/* Markdown rendered output */
.note-rendered{font-size:13px;line-height:1.7;color:var(--text)}
.note-rendered h3{font-size:15px;font-weight:700;margin:10px 0 4px;color:var(--text)}
.note-rendered h4{font-size:13px;font-weight:700;margin:8px 0 3px;color:var(--text)}
.note-rendered p{margin:2px 0}
.note-rendered br{display:block;content:'';margin:1px 0}
.note-rendered ul{margin:4px 0;padding-left:18px;list-style:disc}
.note-rendered ol{margin:4px 0;padding-left:18px;list-style:decimal}
.note-rendered li{margin:1px 0}
.note-rendered hr{border:none;border-top:1px solid var(--border2);margin:10px 0}
.note-rendered code{font-family:monospace;background:var(--bg3);padding:1px 5px;border-radius:3px;font-size:12px}
.note-rendered strong{font-weight:700}
.note-rendered em{font-style:italic;color:var(--text2)}
.note-rendered .md-check{display:flex;align-items:flex-start;gap:6px;margin:2px 0}
.note-rendered .md-check.done{color:var(--text3);text-decoration:line-through}
.note-rendered .md-check.clickable{cursor:pointer;border-radius:4px;padding:1px 4px;margin:1px -4px}
.note-rendered .md-check.clickable:hover{background:var(--bg3)}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;padding:20px;
}
.modal-overlay.hidden{display:none}
.modal{
  background:var(--bg);border-radius:var(--radius-lg);
  width:100%;max-width:560px;max-height:90vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
}
.modal.modal-wide{max-width:900px}
/* split editor */
.editor-split{display:flex;border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;min-height:260px}
.editor-pane-write{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border2);min-width:0}
.editor-pane-write .note-toolbar{border-radius:0;border:none;border-bottom:1px solid var(--border2)}
.editor-pane-write textarea{flex:1;border:none !important;border-radius:0 !important;min-height:220px;resize:none;padding:10px 12px;font-family:inherit;font-size:13px;line-height:1.7;color:var(--text);background:var(--bg)}
.editor-pane-write textarea:focus{outline:none}
.editor-pane-preview{flex:1;display:flex;flex-direction:column;background:var(--bg2);min-width:0}
.eprev-label{font-size:11px;font-weight:600;color:var(--text3);padding:5px 10px;border-bottom:1px solid var(--border);letter-spacing:.04em}
.eprev-body{flex:1;padding:10px 12px;overflow-y:auto;min-height:220px}
.eprev-body:empty::after{content:'미리보기';color:var(--text3);font-size:13px}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--bg);z-index:1;
}
.modal-title{font-weight:700;font-size:15px}
.modal-close{
  background:none;border:none;font-size:18px;cursor:pointer;
  color:var(--text3);padding:2px 6px;border-radius:4px;
}
.modal-close:hover{background:var(--bg2);color:var(--text)}
.modal-body{padding:20px}
.modal-footer{
  padding:14px 20px;border-top:1px solid var(--border);
  display:flex;gap:8px;justify-content:flex-end;
  position:sticky;bottom:0;background:var(--bg);
}

/* ── FORM ── */
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.form-row input,.form-row select,.form-row textarea{
  width:100%;padding:8px 10px;border:1px solid var(--border2);
  border-radius:var(--radius);background:var(--bg);color:var(--text);
  font-family:inherit;font-size:13px;
}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{
  outline:none;border-color:var(--blue);
}
.form-row textarea{resize:vertical;min-height:80px}
.form-row select{cursor:pointer}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-hint{font-size:11px;color:var(--text3);margin-top:4px}
.btn-danger{
  background:none;border:1px solid var(--red);color:var(--red);
  border-radius:var(--radius);padding:7px 14px;font-size:13px;cursor:pointer;
}
.btn-danger:hover{background:var(--red-bg)}

/* ── UPLOAD MODAL ── */
.upload-preview{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;background:var(--bg2);border-radius:var(--radius);
  margin-top:8px;
}
.upload-preview .file-name-preview{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.upload-preview .file-size-preview{font-size:12px;color:var(--text3)}

/* ── TODO TAB ── */
.todo-layout{display:flex;flex:1;overflow:hidden}
.todo-cal-pane{width:256px;flex-shrink:0;border-right:1px solid var(--border2);overflow-y:auto;padding:16px;background:var(--bg2)}
.todo-list-pane{flex:1;overflow:hidden;padding:20px;min-width:0;display:flex;flex-direction:column}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month-label{font-weight:700;font-size:14px;color:var(--text)}
.cal-nav{background:none;border:none;cursor:pointer;font-size:18px;padding:2px 8px;border-radius:4px;color:var(--text2);line-height:1}
.cal-nav:hover{background:var(--bg3);color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:10px;font-weight:600;color:var(--text3);padding:4px 0}
.cal-day{text-align:center;font-size:12px;padding:5px 2px;border-radius:4px;cursor:pointer;position:relative;user-select:none;min-height:32px}
.cal-day:hover{background:var(--bg3)}
.cal-day.empty{cursor:default;pointer-events:none;background:none}
.cal-day.today{font-weight:700;color:var(--blue)}
.cal-day.selected{background:var(--blue) !important;color:#fff !important;font-weight:600}
.cal-dot{width:4px;height:4px;border-radius:50%;background:var(--blue);margin:2px auto 0}
.cal-day.selected .cal-dot{background:rgba(255,255,255,.8)}
.todo-date-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.todo-date-label{font-size:15px;font-weight:700;color:var(--text)}
.todo-count-badge{font-size:12px;color:var(--text3)}
.todo-add-section{border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);margin-bottom:16px;overflow:hidden}
.todo-add-main{display:flex}
.todo-add-main input{flex:1;border:none;padding:10px 12px;background:transparent;color:var(--text);font-family:inherit;font-size:13px}
.todo-add-main input:focus{outline:none}
.todo-add-toggle{background:none;border:none;border-left:1px solid var(--border2);padding:8px 10px;cursor:pointer;color:var(--text3);font-size:12px;white-space:nowrap}
.todo-add-toggle:hover{color:var(--text);background:var(--bg2)}
.todo-add-btn{background:var(--blue);color:#fff;border:none;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:500;border-left:1px solid rgba(0,0,0,.1)}
.todo-add-btn:hover{opacity:.9}
.todo-detail-fields{padding:10px 12px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:8px}
.todo-detail-fields.hidden{display:none}
.todo-detail-fields input{width:100%;padding:6px 8px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:inherit;font-size:12px}
.todo-detail-fields input:focus{outline:none;border-color:var(--blue)}
.todo-detail-fields .memo-row{grid-column:1/-1}
.todo-rollover-section{margin-bottom:14px;border:1px solid var(--amber);border-radius:var(--radius-lg);overflow:hidden}
.todo-rollover-header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--amber-bg);cursor:pointer;user-select:none}
.todo-rollover-header-label{font-size:12px;font-weight:700;color:var(--amber);flex:1}
.todo-rollover-count{font-size:11px;background:var(--amber);color:var(--bg);border-radius:99px;padding:1px 7px;font-weight:600}
.btn-rollover-all{font-size:11px;padding:3px 9px;border:1px solid var(--amber);color:var(--amber);background:none;border-radius:99px;cursor:pointer;white-space:nowrap}
.btn-rollover-all:hover{background:var(--amber);color:var(--bg)}
.todo-rollover-list{padding:8px 10px;display:flex;flex-direction:column;gap:5px}
.todo-rollover-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg)}
.todo-rollover-from{font-size:10px;font-weight:600;color:var(--amber);background:var(--amber-bg);border-radius:99px;padding:1px 6px;white-space:nowrap;flex-shrink:0}
.btn-rollover-one{font-size:11px;padding:2px 8px;border:1px solid var(--border2);color:var(--text2);background:none;border-radius:99px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.btn-rollover-one:hover{border-color:var(--blue);color:var(--blue)}
.todo-rolled-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:var(--amber);background:var(--amber-bg);border-radius:99px;padding:2px 8px;white-space:nowrap;flex-shrink:0}
.btn-restore-one{font-size:10px;padding:1px 6px;border:1px solid var(--amber);color:var(--amber);background:none;border-radius:99px;cursor:pointer}
.btn-restore-one:hover{background:var(--amber);color:var(--bg)}
.todo-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);margin-bottom:6px}
.todo-item:hover{border-color:var(--border2)}
.todo-item.done-item .todo-text{text-decoration:line-through;color:var(--text3)}
.todo-checkbox{width:16px;height:16px;flex-shrink:0;cursor:pointer;margin-top:2px;accent-color:var(--blue)}
.todo-body{flex:1;min-width:0}
.todo-text{font-size:13px;color:var(--text);line-height:1.5;word-break:break-word}
.todo-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.todo-chip{font-size:11px;color:var(--text3)}
.todo-memo-text{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5}
.todo-item-actions{display:flex;gap:2px;flex-shrink:0}
.todo-item-actions button{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 5px;border-radius:4px;color:var(--text3)}
.todo-item-actions button:hover{background:var(--bg3);color:var(--text)}

/* ── TODO VIEW TOGGLE ── */
.todo-view-toolbar{display:flex;justify-content:flex-end;padding:0 0 14px 0;flex-shrink:0}
.todo-view-btn{background:none;border:1px solid var(--border2);color:var(--text2);padding:5px 14px;font-size:12px;font-weight:500;cursor:pointer;margin-left:-1px}
.todo-view-btn:first-child{border-radius:var(--radius) 0 0 var(--radius)}
.todo-view-btn:last-child{border-radius:0 var(--radius) var(--radius) 0}
.todo-view-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);z-index:1;position:relative}
.todo-view-btn:hover:not(.active){background:var(--bg2);color:var(--text)}
/* ── WEEKLY VIEW ── */
.todo-weekly-grid{display:grid;grid-template-columns:repeat(5,1fr) 0.65fr 0.65fr;gap:8px;flex:1;min-height:0;min-width:640px}
.todo-week-col{display:flex;flex-direction:column;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);min-height:0;overflow:hidden}
.todo-week-col.weekend{background:var(--bg2)}
.todo-week-col-header{padding:8px 10px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.todo-week-col-header.today-col{background:var(--blue-bg)}
.todo-week-dow{font-size:11px;font-weight:600;color:var(--text3)}
.todo-week-date{font-size:15px;font-weight:700;color:var(--text);line-height:1.2}
.todo-week-date.today-date{color:var(--blue)}
.todo-week-items{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:4px}
.todo-week-card{font-size:12px;padding:5px 8px;border-radius:4px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;line-height:1.4;word-break:break-word}
.todo-week-card.done-card{text-decoration:line-through;color:var(--text3);opacity:.7}
.todo-week-card:hover{border-color:var(--blue)}
.todo-week-add{flex-shrink:0;border:none;border-top:1px solid var(--border);width:100%;padding:6px;background:none;color:var(--text3);font-size:12px;cursor:pointer;text-align:left}
.todo-week-add:hover{background:var(--bg3);color:var(--text)}
/* ── MONTHLY VIEW ── */
.todo-monthly-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.todo-month-dow-header{background:var(--bg2);text-align:center;padding:6px 0;font-size:11px;font-weight:600;color:var(--text3)}
.todo-month-cell{background:var(--bg);padding:4px 6px;min-height:80px;cursor:pointer;display:flex;flex-direction:column;gap:2px;overflow:hidden}
.todo-month-cell:hover{background:var(--bg2)}
.todo-month-cell.empty{background:var(--bg2);cursor:default;pointer-events:none}
.todo-month-cell.today-cell{background:var(--blue-bg)}
.todo-month-day-num{font-size:12px;font-weight:600;color:var(--text2);line-height:1}
.todo-month-cell.today-cell .todo-month-day-num{color:var(--blue)}
.todo-month-item-preview{font-size:11px;padding:2px 4px;border-radius:3px;background:var(--blue-bg);color:var(--blue-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.todo-month-item-preview.done-preview{background:var(--bg3);color:var(--text3);text-decoration:line-through}
.todo-month-more{font-size:10px;color:var(--text3);padding-left:2px}

/* ── BRIEFING TAB ── */
.briefing-pane{padding:20px 24px;overflow-y:auto;height:100%;box-sizing:border-box}
.briefing-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 24px;align-items:start}
.briefing-full{grid-column:1/-1}
.briefing-section{margin-bottom:28px}
.briefing-section-title{
  font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--text3);margin-bottom:12px;padding-bottom:6px;
  border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;
}
.briefing-section-title .bs-count{
  font-size:11px;font-weight:500;background:var(--bg3);color:var(--text2);
  border-radius:99px;padding:1px 7px;letter-spacing:0;text-transform:none;
}
.briefing-agent-card{
  background:var(--blue-bg);border:1px solid var(--blue);
  border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:10px;
}
.briefing-agent-meta{font-size:11px;color:var(--blue-text);margin-bottom:8px;opacity:.8}
.briefing-agent-summary{font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px;line-height:1.5}
.briefing-insight{
  display:flex;align-items:flex-start;gap:8px;padding:7px 0;
  font-size:13px;color:var(--text);border-bottom:1px solid var(--border);line-height:1.5;
}
.briefing-insight:last-child{border-bottom:none}
.briefing-calendar-item{
  display:flex;align-items:center;gap:10px;padding:6px 0;
  font-size:13px;color:var(--text);border-bottom:1px solid var(--border);
}
.briefing-calendar-time{font-size:12px;font-weight:600;color:var(--blue);min-width:48px}
.briefing-calendar-item:last-child{border-bottom:none}
.briefing-gmail-item{
  display:flex;align-items:flex-start;gap:8px;padding:6px 0;
  font-size:13px;color:var(--text2);border-bottom:1px solid var(--border);
}
.briefing-gmail-item:last-child{border-bottom:none}
.briefing-todo-item{
  display:flex;align-items:center;gap:10px;padding:8px 10px;
  border:1px solid var(--border);border-radius:var(--radius);
  background:var(--bg);margin-bottom:5px;font-size:13px;
}
.briefing-todo-done{opacity:.5;text-decoration:line-through}
.briefing-issue-row{
  display:flex;align-items:center;gap:8px;padding:8px 12px;
  border:1px solid var(--border);border-radius:var(--radius);
  background:var(--bg);margin-bottom:5px;
}
.briefing-issue-row.high{border-left:3px solid var(--red)}
.briefing-issue-row.medium{border-left:3px solid var(--amber)}
.briefing-issue-row.low{border-left:3px solid var(--green)}
.briefing-step-current{
  background:var(--blue-bg);border:1px solid var(--blue);
  border-radius:var(--radius);padding:8px 12px;
  font-size:13px;color:var(--blue-text);margin-bottom:5px;
}
.briefing-step-next{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:8px 12px;
  font-size:13px;color:var(--text2);margin-bottom:5px;
}
.briefing-empty{
  text-align:center;padding:30px 20px;color:var(--text3);font-size:13px;
  border:1px dashed var(--border2);border-radius:var(--radius-lg);
}
.briefing-weekly-card{
  border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:14px 16px;background:var(--bg2);
}
.briefing-weekly-summary{font-size:13px;color:var(--text);margin-bottom:10px;line-height:1.6}
.briefing-weekly-stat{
  display:flex;gap:16px;margin-bottom:10px;flex-wrap:wrap;
}
.briefing-stat-chip{
  font-size:12px;background:var(--bg3);border-radius:99px;
  padding:3px 10px;color:var(--text2);
}
.briefing-next-action{
  display:flex;align-items:center;gap:8px;font-size:12px;
  color:var(--text2);padding:3px 0;
}
.briefing-setup-banner{
  background:var(--amber-bg);border:1px solid var(--amber);
  border-radius:var(--radius-lg);padding:14px 16px;
  display:flex;align-items:center;gap:12px;margin-bottom:20px;
}
.briefing-setup-banner p{font-size:13px;color:var(--text);flex:1}

/* ── COMM TYPE COLORS ── */
.ct-email { --ct-c:#2e7de9; --ct-b:#dce8fb }
.ct-phone { --ct-c:#587539; --ct-b:#ddeec8 }
.ct-video { --ct-c:#9854f1; --ct-b:#ece0fd }
.ct-meet  { --ct-c:#8c6c3e; --ct-b:#f0e4cc }
.ct-msg   { --ct-c:#007197; --ct-b:#c3e7f0 }
@media (prefers-color-scheme:dark){
  :root:not([data-theme="light"]) .ct-email { --ct-c:#7aa2f7; --ct-b:#1a2744 }
  :root:not([data-theme="light"]) .ct-phone { --ct-c:#9ece6a; --ct-b:#1a2b14 }
  :root:not([data-theme="light"]) .ct-video { --ct-c:#bb9af7; --ct-b:#1e1535 }
  :root:not([data-theme="light"]) .ct-meet  { --ct-c:#e0af68; --ct-b:#2b200f }
  :root:not([data-theme="light"]) .ct-msg   { --ct-c:#0db9d7; --ct-b:#0d2b30 }
}
[data-theme="dark"] .ct-email { --ct-c:#7aa2f7; --ct-b:#1a2744 }
[data-theme="dark"] .ct-phone { --ct-c:#9ece6a; --ct-b:#1a2b14 }
[data-theme="dark"] .ct-video { --ct-c:#bb9af7; --ct-b:#1e1535 }
[data-theme="dark"] .ct-meet  { --ct-c:#e0af68; --ct-b:#2b200f }
[data-theme="dark"] .ct-msg   { --ct-c:#0db9d7; --ct-b:#0d2b30 }
.comm-type-badge.ct-colored { background:var(--ct-b); color:var(--ct-c); }
.comm-card.ct-colored { border-left:3px solid var(--ct-c); }
/* 뷰 토글 버튼 */
.comm-view-btn { background:none; border:1px solid var(--border2); color:var(--text2); padding:5px 12px; font-size:12px; font-weight:500; cursor:pointer; margin-left:-1px; }
.comm-view-btn:first-child { border-radius:var(--radius) 0 0 var(--radius); }
.comm-view-btn:last-child  { border-radius:0 var(--radius) var(--radius) 0; }
.comm-view-btn.active { background:var(--blue); color:#fff; border-color:var(--blue); z-index:1; position:relative; }
.comm-view-btn:hover:not(.active) { background:var(--bg2); color:var(--text); }
/* 타임라인 레이아웃 */
.timeline { display:flex; flex-direction:column; }
.tl-item  { display:grid; grid-template-columns:64px 28px 1fr; }
.tl-date-col { padding-top:13px; text-align:right; padding-right:10px; font-size:11px; font-weight:600; color:var(--text3); white-space:nowrap; line-height:1.4; }
.tl-line-col { display:flex; flex-direction:column; align-items:center; }
.tl-dot  { width:12px; height:12px; border-radius:50%; background:var(--ct-c); margin-top:13px; flex-shrink:0; z-index:1; box-shadow:0 0 0 3px var(--ct-b); }
.tl-line { flex:1; width:2px; background:var(--border2); min-height:6px; }
.tl-card-col { padding:6px 0 14px 10px; }
.tl-card { border:1px solid var(--border); border-radius:var(--radius-lg); background:var(--bg); overflow:hidden; border-left:3px solid var(--ct-c); cursor:pointer; transition:border-color .15s; }
.tl-card:hover { border-color:var(--ct-c); background:var(--bg2); }
.tl-card.card-selected { outline:2px solid var(--ct-c); outline-offset:-1px; }
.tl-card-header { display:flex; align-items:center; gap:8px; padding:9px 12px; background:var(--bg2); border-bottom:1px solid var(--border); }
.tl-card-body { padding:10px 12px; font-size:13px; color:var(--text2); line-height:1.6; }
.tl-preview { overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }

/* ── FILE CATEGORY COLORS ── */
.fc-req  { --cc:#2e7de9; --cb:#dce8fb }
.fc-cntr { --cc:#c64343; --cb:#f9dede }
.fc-meet { --cc:#587539; --cb:#ddeec8 }
.fc-plan { --cc:#9854f1; --cb:#ece0fd }
.fc-out  { --cc:#8c6c3e; --cb:#f0e4cc }
.fc-etc  { --cc:#9699b4; --cb:#e0e1ea }
@media (prefers-color-scheme:dark){
  :root:not([data-theme="light"]) .fc-req  { --cc:#7aa2f7; --cb:#1a2744 }
  :root:not([data-theme="light"]) .fc-cntr { --cc:#f7768e; --cb:#2b1520 }
  :root:not([data-theme="light"]) .fc-meet { --cc:#9ece6a; --cb:#1a2b14 }
  :root:not([data-theme="light"]) .fc-plan { --cc:#bb9af7; --cb:#1e1535 }
  :root:not([data-theme="light"]) .fc-out  { --cc:#e0af68; --cb:#2b200f }
  :root:not([data-theme="light"]) .fc-etc  { --cc:#a9b1d6; --cb:#24283b }
}
[data-theme="dark"] .fc-req  { --cc:#7aa2f7; --cb:#1a2744 }
[data-theme="dark"] .fc-cntr { --cc:#f7768e; --cb:#2b1520 }
[data-theme="dark"] .fc-meet { --cc:#9ece6a; --cb:#1a2b14 }
[data-theme="dark"] .fc-plan { --cc:#bb9af7; --cb:#1e1535 }
[data-theme="dark"] .fc-out  { --cc:#e0af68; --cb:#2b200f }
[data-theme="dark"] .fc-etc  { --cc:#a9b1d6; --cb:#24283b }
.filter-btn.fcat { border-color:var(--cc); color:var(--cc); }
.filter-btn.fcat:hover { background:var(--cb); border-color:var(--cc); color:var(--cc); }
.filter-btn.fcat.active { background:var(--cc); color:#fff; border-color:var(--cc); }
.fcat-badge { background:var(--cb); color:var(--cc); border:1px solid color-mix(in srgb, var(--cc) 30%, transparent); }
.file-item.fcat { border-left:3px solid var(--cc); }

/* ── GLOBAL SEARCH ── */
.gsearch-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:flex;align-items:flex-start;justify-content:center;
  z-index:2000;padding:80px 20px 20px;
}
.gsearch-overlay.hidden{display:none}
.gsearch-box{
  background:var(--bg);border-radius:var(--radius-lg);
  width:100%;max-width:660px;
  box-shadow:0 24px 80px rgba(0,0,0,.35);
  display:flex;flex-direction:column;max-height:calc(100vh - 120px);
  overflow:hidden;
}
.gsearch-input-row{
  display:flex;align-items:center;gap:10px;
  padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.gsearch-input-row .gsearch-icon{font-size:16px;color:var(--text3)}
.gsearch-input{
  flex:1;border:none;background:transparent;color:var(--text);
  font-family:inherit;font-size:15px;outline:none;
}
.gsearch-input::placeholder{color:var(--text3)}
.gsearch-kbd{
  font-size:11px;color:var(--text3);background:var(--bg3);
  border:1px solid var(--border2);border-radius:4px;padding:2px 7px;
  white-space:nowrap;cursor:pointer;flex-shrink:0;
}
.gsearch-results{overflow-y:auto;padding:6px 0}
.gsearch-section-label{
  font-size:11px;font-weight:600;color:var(--text3);
  letter-spacing:.06em;text-transform:uppercase;
  padding:10px 16px 4px;
}
.gsearch-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 16px;cursor:pointer;
}

// ── DB ────────────────────────────────────────────────────────────
class DB {
  constructor(){this.db=null}
  init(){
    return new Promise((res,rej)=>{
      const req=indexedDB.open(DB_NAME,DB_VERSION);
      req.onupgradeneeded=e=>{
        const db=e.target.result;
        if(!db.objectStoreNames.contains('projects')){
          db.createObjectStore('projects',{keyPath:'id'});
        }
        if(!db.objectStoreNames.contains('communications')){
          const s=db.createObjectStore('communications',{keyPath:'id'});
          s.createIndex('projectId','projectId',{unique:false});
        }
        if(!db.objectStoreNames.contains('files')){
          const s=db.createObjectStore('files',{keyPath:'id'});
          s.createIndex('projectId','projectId',{unique:false});
        }
        if(!db.objectStoreNames.contains('issues')){
          const s=db.createObjectStore('issues',{keyPath:'id'});
          s.createIndex('projectId','projectId',{unique:false});
        }
        if(db.objectStoreNames.contains('notes')){
          db.deleteObjectStore('notes');
        }
        const ns=db.createObjectStore('notes',{keyPath:'id'});
        ns.createIndex('projectId','projectId',{unique:false});
        if(!db.objectStoreNames.contains('threads')){
          const ts=db.createObjectStore('threads',{keyPath:'id'});
          ts.createIndex('parentId','parentId',{unique:false});
        }
        if(!db.objectStoreNames.contains('todos')){
          const td=db.createObjectStore('todos',{keyPath:'id'});
          td.createIndex('projectId','projectId',{unique:false});
          td.createIndex('date','date',{unique:false});
        }
        if(!db.objectStoreNames.contains('settings')){
          db.createObjectStore('settings',{keyPath:'key'});
        }
      };
      req.onsuccess=e=>{this.db=e.target.result;res()};
      req.onerror=e=>rej(e.target.error);
    });
  }
  _tx(stores,mode='readonly'){
    return this.db.transaction(stores,mode);
  }
  get(store,key){
    return new Promise((res,rej)=>{
      const req=this._tx(store).objectStore(store).get(key);
      req.onsuccess=e=>res(e.target.result);
      req.onerror=e=>rej(e.target.error);
    });
  }
  getAll(store){
    return new Promise((res,rej)=>{
      const req=this._tx(store).objectStore(store).getAll();
      req.onsuccess=e=>res(e.target.result);
      req.onerror=e=>rej(e.target.error);
    });
  }
  getByIndex(store,indexName,value){
    return new Promise((res,rej)=>{
      const req=this._tx(store).objectStore(store).index(indexName).getAll(value);
      req.onsuccess=e=>res(e.target.result);
      req.onerror=e=>rej(e.target.error);
    });
  }
  put(store,obj){
    return new Promise((res,rej)=>{
      const req=this._tx(store,'readwrite').objectStore(store).put(obj);
      req.onsuccess=e=>res(e.target.result);
      req.onerror=e=>rej(e.target.error);
    });
  }
  delete(store,key){
    return new Promise((res,rej)=>{
      const req=this._tx(store,'readwrite').objectStore(store).delete(key);
      req.onsuccess=()=>res();
      req.onerror=e=>rej(e.target.error);
    });
  }
}

// ── HELPERS ──────────────────────────────────────────────────────
function genId(){
  return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36)+Math.random().toString(36).slice(2);
}
function esc(str){
  if(!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtSize(bytes){
  if(bytes<1024) return bytes+'B';
  if(bytes<1024*1024) return (bytes/1024).toFixed(1)+'KB';
  return (bytes/1024/1024).toFixed(1)+'MB';
}
function fileIcon(mimeType){
  if(!mimeType) return '📄';
  if(mimeType.includes('pdf')) return '📕';
  if(mimeType.includes('image')) return '🖼️';
  if(mimeType.includes('word')||mimeType.includes('document')) return '📝';
  if(mimeType.includes('excel')||mimeType.includes('sheet')) return '📊';
  if(mimeType.includes('powerpoint')||mimeType.includes('presentation')) return '📊';
  if(mimeType.includes('zip')||mimeType.includes('compressed')) return '📦';
  return '📄';
}

// ── AGENT SYNC ────────────────────────────────────────────────────
async function getSyncDirHandle(){
  try{
    const rec = await db.get('settings','syncDir');
    if(rec?.handle){
      const perm = await rec.handle.queryPermission({mode:'readwrite'});
      if(perm==='granted') return rec.handle;
      const req = await rec.handle.requestPermission({mode:'readwrite'});
      if(req==='granted') return rec.handle;
    }
  }catch(e){}
  return null;
}

async function setupSyncDir(){
  try{
    const handle = await window.showDirectoryPicker({mode:'readwrite'});
    await db.put('settings',{key:'syncDir', handle});
    showToast('✅ Agent 폴더 연결 완료');
    await autoSaveDashboard(handle);
    return handle;
  }catch(e){ return null; }
}

async function autoSaveDashboard(dirHandle){
  const handle = dirHandle || await getSyncDirHandle();
  if(!handle) return;
  try{
    const p = await db.get('projects', PROJECT_ID);
    const comms = await db.getByIndex('communications','projectId',PROJECT_ID);
    const issues = await db.getByIndex('issues','projectId',PROJECT_ID);
    const notes = await db.getByIndex('notes','projectId',PROJECT_ID);
    const todos = await db.getByIndex('todos','projectId',PROJECT_ID);
    const data = {
      version:3, exportedAt:new Date().toISOString(),
      project:p, communications:comms, issues, notes, todos
    };
    const fileH = await handle.getFileHandle('dashboard-data.json',{create:true});
    const writable = await fileH.createWritable();
    await writable.write(JSON.stringify(data,null,2));
    await writable.close();
  }catch(e){ console.warn('autoSave failed',e); }
}

async function readSyncFile(filename){
  const handle = await getSyncDirHandle();
  if(!handle) return null;
  try{
    const fileH = await handle.getFileHandle(filename);
    const f = await fileH.getFile();
    return JSON.parse(await f.text());
  }catch(e){ return null; }
}

async function deleteSyncFile(filename){
  const handle = await getSyncDirHandle();
  if(!handle) return;
  try{ await handle.removeEntry(filename); }catch(e){}
}

  showModal(`📥 ${esc(q.meetingTitle||'회의록')} 가져오기`,`

      ${issuesHtml}
    </div>
    <div>
      <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">💬 커뮤니케이션 ${(q.communications||[]).length}건</div>
      ${commHtml}
    </div>`,
    [{label:'가져오기', cls:'btn-primary', action: async()=>{
      const now = Date.now();
      await Promise.all([
        ...(q.todos||[]).map((t,i)=>db.put('todos',{
          id:genId(), projectId:PROJECT_ID,
          content:t.content||'', date:t.date||new Date().toISOString().slice(0,10),
          assignee:t.assignee||'', memo:t.memo||'', time:'', deadline:'',
          done:false, createdAt:now+i
        })),
        ...(q.issues||[]).map((is,i)=>db.put('issues',{
          id:genId(), projectId:PROJECT_ID,
          title:is.title||'', priority:is.priority||'medium',
          description:is.description||'', status:'open',
          createdAt:new Date().toISOString(), updatedAt:new Date().toISOString()
        })),
        ...(q.communications||[]).map((c,i)=>db.put('communications',{
          id:genId(), projectId:PROJECT_ID,
          date:c.date||new Date().toISOString().slice(0,10),
          type:c.type||'대면미팅', participants:c.participants||'',
          summary:c.summary||'', nextAction:c.nextAction||'',
          createdAt:now+i
        })),
      ]);
      await deleteSyncFile('import-queue.json');
      showToast(`✅ 할일 ${(q.todos||[]).length}개, 이슈 ${(q.issues||[]).length}개, 커뮤니케이션 ${(q.communications||[]).length}건 추가됨`);

  if(project.startDate||project.endDate) meta.push(`📅 ${project.startDate||'?'} ~ ${project.endDate||'?'}`);

  document.getElementById('proj-meta').innerHTML = meta.map(m=>`<span class="meta-item">${esc(m)}</span>`).join('');
}

      <div class="briefing-agent-meta">${isToday?'📅 오늘':'🕐'} ${d} 생성</div>
      <div class="briefing-agent-summary">${esc(briefData.summary||'요약 없음')}</div>
      ${(briefData.insights||[]).map(i=>`<div class="briefing-insight"><span>•</span><span>${esc(i)}</span></div>`).join('')}
    </div>`;

    secA += `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px">

    if((briefData.calendar||[]).length){
      secA += briefData.calendar.map(c=>`<div class="briefing-calendar-item">
        <span class="briefing-calendar-time">${esc(c.split(' ')[0]||'')}</span>
        <span>${esc(c.split(' ').slice(1).join(' ')||c)}</span>
      </div>`).join('');
    } else {
      secA += `<div style="font-size:12px;color:var(--text3)">일정 없음</div>`;
    }
    secA += `</div>`;
    // Gmail 컬럼
    secA += `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px">
      <div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em">📧 Gmail 하이라이트</div>`;
    if((briefData.gmailHighlights||[]).length){
      secA += briefData.gmailHighlights.map(g=>`<div class="briefing-gmail-item">
        <span style="flex-shrink:0">•</span><span>${esc(g)}</span>
      </div>`).join('');
    } else {
      secA += `<div style="font-size:12px;color:var(--text3)">새 메일 없음</div>`;
    }
    secA += `</div>`;
    secA += `</div>`; // end 3-col grid
  } else {
    secA += `<div class="briefing-empty">오늘 브리핑이 아직 생성되지 않았습니다.<br>
      매일 08:03 루틴이 <code>briefing-data.json</code>을 생성합니다.</div>`;
  }
  secA += `</div>`;

  // ── 섹션 B: 오늘 할일 (좌)
  const todayTodos = todos.filter(t=>t.date===today);
  const doneTodos = todayTodos.filter(t=>t.done);
  let secB = `<div class="briefing-section">
    <div class="briefing-section-title">✅ 오늘의 할일
      <span class="bs-count">${doneTodos.length}/${todayTodos.length}</span>
    </div>`;
  if(!todayTodos.length){
    secB += `<div class="briefing-empty">오늘 등록된 할일이 없습니다.</div>`;
  } else {
    secB += todayTodos.sort((a,b)=>a.done-b.done).map(t=>`
      <div class="briefing-todo-item ${t.done?'briefing-todo-done':''}">
        <span>${t.done?'☑️':'☐'}</span>
        <span style="flex:1">${esc(t.text||t.title||'')}</span>
        ${t.priority?`<span style="font-size:11px;color:var(--text3)">${esc(t.priority)}</span>`:''}
      </div>`).join('');
  }
  secB += `</div>`;

  // ── 섹션 D: 진행현황 (좌)
  const steps = project?.steps||{};
  const done = STEPS.filter(s=>(steps[s.id]||'pending')==='done').length;
  const inProgress = STEPS.filter(s=>(steps[s.id]||'pending')==='in-progress');
  const pending = STEPS.filter(s=>(steps[s.id]||'pending')==='pending');
  const pct = Math.round(done/STEPS.length*100);
  let secD = `<div class="briefing-section">
    <div class="briefing-section-title">📈 구축 진행현황</div>
    <div style="margin-bottom:10px">
      <div class="progress-bar-wrap" style="margin-bottom:6px">
        <div class="progress-bar-fill" style="width:${pct}%"></div>
      </div>
      <span style="font-size:12px;color:var(--text2)">${done}/${STEPS.length} 완료 (${pct}%)</span>
    </div>`;
  if(inProgress.length){
    secD += inProgress.map(s=>`<div class="briefing-step-current">🔄 현재 진행: ${esc(s.name)}</div>`).join('');
  }
  if(pending.length){
    secD += `<div class="briefing-step-next">▶ 다음 대기: ${esc(pending[0].name)}</div>`;
  }
  secD += `</div>`;

  // ── 섹션 C: 이슈 현황 (우)
  const openIssues = issues.filter(i=>i.status!=='resolved')
    .sort((a,b)=>({high:0,medium:1,low:2}[a.priority]||1)-({high:0,medium:1,low:2}[b.priority]||1));
  const PRIORITY_KO = {high:'높음',medium:'보통',low:'낮음'};
  let secC = `<div class="briefing-section">
    <div class="briefing-section-title">🔥 오픈 이슈
      <span class="bs-count">${openIssues.length}건</span>
    </div>`;
  if(!openIssues.length){
    secC += `<div class="briefing-empty">오픈 이슈가 없습니다 🎉</div>`;
  } else {
    secC += openIssues.map(i=>`
      <div class="briefing-issue-row ${i.priority||'low'}">
        <span class="priority-badge ${i.priority||'low'}">${PRIORITY_KO[i.priority]||'낮음'}</span>
        <span style="flex:1;font-size:13px">${esc(i.title||'')}</span>
        <span style="font-size:11px;color:var(--text3)">${esc(i.status||'open')}</span>
      </div>`).join('');
  }
  secC += `</div>`;

  // ── 섹션 E: 주간 요약 (우)
  let secE = `<div class="briefing-section">
    <div class="briefing-section-title">📋 주간 요약</div>`;
  if(weeklyData){
    secE += `<div class="briefing-weekly-card">
      <div style="font-size:12px;color:var(--text3);margin-bottom:6px">${esc(weeklyData.weekLabel||'')} · ${esc(weeklyData.generatedAt?.slice(0,10)||'')}</div>
      <div class="briefing-weekly-summary">${esc(weeklyData.summary||'')}</div>
      <div class="briefing-weekly-stat">
        ${weeklyData.stats?`
          <span class="briefing-stat-chip">📬 커뮤니케이션 ${weeklyData.stats.commCount||0}건</span>
          <span class="briefing-stat-chip">✅ 완료 이슈 ${weeklyData.stats.issueResolved||0}건</span>
          <span class="briefing-stat-chip">☑️ 할일 ${weeklyData.stats.todosDone||0}/${weeklyData.stats.todosTotal||0}</span>
        `:''}
      </div>
      ${(weeklyData.nextActions||[]).map(a=>`<div class="briefing-next-action">→ ${esc(a)}</div>`).join('')}
    </div>`;
  } else {
    secE += `<div class="briefing-empty">주간 리뷰가 아직 생성되지 않았습니다.<br>
      매주 금요일 18:07 루틴이 <code>weekly-data.json</code>을 생성합니다.</div>`;
  }
  secE += `</div>`;

  // ── 회의록 가져오기 버튼 (import-queue.json 있을 때만)
  const queueData = await readSyncFile('import-queue.json');
  const queueBanner = queueData ? `
    <div class="briefing-full" style="margin-bottom:0">
      <div class="briefing-setup-banner" style="background:var(--green-bg);border-color:var(--green)">
        <span style="font-size:20px">📥</span>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600;color:var(--text)">${esc(queueData.meetingTitle||'회의록')} 추출 완료</div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px">
            할일 ${(queueData.todos||[]).length}개 · 이슈 ${(queueData.issues||[]).length}개 · 커뮤니케이션 ${(queueData.communications||[]).length}건
          </div>
        </div>
        <button class="btn-primary" onclick="importFromQueue()">대시보드에 가져오기</button>
      </div>
    </div>` : '';

  // ── 레이아웃 조립: A(풀) / 좌(B+D) 우(C+E)
  html += `<div class="briefing-grid">
    ${queueBanner}
    ${secA}
    <div>${secB}${secD}</div>
    <div>${secC}${secE}</div>
  </div>`;

  root.innerHTML = html;
}

// ── STEPS TAB ────────────────────────────────────────────────────
async function renderSteps(){
  const steps = project?.steps || {};
  const done = STEPS.filter(s=>(steps[s.id]||'pending')==='done').length;
  const pct = Math.round(done/STEPS.length*100);

  const el = document.getElementById('tab-content');
  el.innerHTML = `<div class="list-pane">
    <div class="progress-header">
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <span class="progress-label">${done}/${STEPS.length} 완료 (${pct}%)</span>
    </div>
    <div id="step-groups"></div>
  </div>`;

  const groups = [...new Set(STEPS.map(s=>s.group))];
  const groupEl = document.getElementById('step-groups');
  groups.forEach(g=>{
    const items = STEPS.filter(s=>s.group===g);
    const div = document.createElement('div');
    div.className = 'step-group';
    div.innerHTML = `<div class="step-group-title">${esc(g)}</div>`;
    items.forEach(s=>{
      const st = steps[s.id]||'pending';
      const item = document.createElement('div');
      item.className = 'step-item';
      item.innerHTML = `
        <span class="step-num">Step ${s.num}</span>
        <button class="step-toggle" data-id="${s.id}" title="클릭하여 상태 변경">${STATUS_EMOJI[st]}</button>
        <span class="step-title">${esc(s.title)}</span>
        <span class="step-status-badge ${st}">${STATUS_LABEL[st]}</span>
        <a class="step-guide-link" href="./index.html#${s.id}" target="_blank">가이드 →</a>
      `;
      div.appendChild(item);
    });
    groupEl.appendChild(div);
  });

  groupEl.addEventListener('click', async e=>{
    const btn = e.target.closest('.step-toggle');
    if(!btn) return;
    const id = btn.dataset.id;
    const cur = (project.steps||{})[id]||'pending';
    const next = STATUS_CYCLE[cur];
    if(!project.steps) project.steps={};
    project.steps[id] = next;
    project.updatedAt = Date.now();
    await db.put('projects', project);
    renderTab('steps');
  });
}

async function loadComm(){
  let items = await db.getByIndex('communications','projectId',PROJECT_ID);
  items.sort((a,b)=>b.date.localeCompare(a.date));
  if(commSearch){
    const q = commSearch.toLowerCase();
    items = items.filter(i=>
      (i.content||'').toLowerCase().includes(q)||
      (i.participants||'').toLowerCase().includes(q)||
      (i.actionItems||'').toLowerCase().includes(q)
    );
  }
  const el = document.getElementById('comm-list');
  if(!el) return;
  if(!items.length){
    el.innerHTML = `<div class="empty-state"><p>커뮤니케이션 기록이 없습니다</p><span>+ 버튼으로 첫 기록을 추가해보세요</span></div>`;
    return;
  }
  if(commView === 'timeline'){
    renderCommTimeline(items, el);
  } else {
    renderCommCards(items, el);
  }
}

function renderCommCards(items, el){
  el.innerHTML = items.map(c=>{
    const m = COMM_TYPE_META[c.type]||{cls:'',icon:''};
    return `
    <div class="comm-card ct-colored ${m.cls}${selectedItem?.id===c.id?' card-selected':''}">
      <div class="comm-card-header thread-trigger" data-thread-id="${c.id}" data-thread-type="comm">
        <span class="comm-date">${esc(c.date)}</span>
        <span class="comm-type-badge ct-colored ${m.cls}">${m.icon} ${esc(c.type)}</span>
        <span class="comm-participants">${esc(c.participants)}</span>
        <div class="card-actions">
          <button onclick="showCommModal('${c.id}')" title="수정">✏️</button>
          <button onclick="deleteComm('${c.id}')" title="삭제">🗑️</button>
        </div>
      </div>
      <div class="comm-card-body">
        <div class="note-rendered">${renderMarkdown(c.content)}</div>
      </div>
    </div>`;
  }).join('');
}

function renderCommTimeline(items, el){
  const rows = items.map((c, idx)=>{
    const m = COMM_TYPE_META[c.type]||{cls:'ct-email',icon:'📧'};
    const dateParts = c.date.split('-');
    const dateLabel = dateParts.length===3 ? `${dateParts[1]}/${dateParts[2]}` : c.date;
    const yearLabel = dateParts[0]||'';
    const isFirst = idx===0;
    const isLast = idx===items.length-1;
    const preview = (c.content||'').replace(/^#+\s/gm,'').replace(/\*\*/g,'').replace(/\*/g,'').replace(/`/g,'').replace(/\n/g,' ').trim().slice(0,120);
    return `
    <div class="tl-item ${m.cls}">
      <div class="tl-date-col">
        ${isFirst||dateParts[0]!==items[idx-1]?.date.split('-')[0]?`<div style="font-size:10px;color:var(--text3);margin-bottom:2px">${yearLabel}</div>`:''}
        ${dateLabel}
      </div>
      <div class="tl-line-col">
        ${isFirst?'':'<div class="tl-line"></div>'}
        <div class="tl-dot"></div>
        ${isLast?'':'<div class="tl-line"></div>'}
      </div>
      <div class="tl-card-col">
        <div class="tl-card ${m.cls}${selectedItem?.id===c.id?' card-selected':''}" data-thread-id="${c.id}" data-thread-type="comm">
          <div class="tl-card-header">
            <span class="comm-type-badge ct-colored ${m.cls}">${m.icon} ${esc(c.type)}</span>
            <span style="font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.participants)}</span>
            <div class="card-actions">
              <button onclick="showCommModal('${c.id}')" title="수정">✏️</button>
              <button onclick="deleteComm('${c.id}')" title="삭제">🗑️</button>
            </div>
          </div>
          <div class="tl-card-body">
            <div class="tl-preview">${esc(preview)}</div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
  el.innerHTML = `<div class="timeline">${rows}</div>`;
}

  showModal('커뮤니케이션 '+(id?'수정':'추가'), `
    <div class="form-row-2">
      <div class="form-row">
        <label>날짜</label>
        <input type="date" id="f-date" value="${esc(item?.date||today)}">
      </div>
      <div class="form-row">
        <label>방식</label>
        <select id="f-type">
          ${COMM_TYPES.map(t=>`<option${item?.type===t?' selected':''}>${esc(t)}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row">
      <label>참석자</label>

    <div class="form-row">
      <label>내용</label>
      ${makeToolbarHtml('f-content')}
      <textarea id="f-content" rows="10" style="border-radius:0 0 var(--radius) var(--radius)" placeholder="내용, 결정사항, 액션아이템 등 자유롭게 작성하세요...">${esc((item?.content||'')+(item?.actionItems?'\n\n---\n\n'+item.actionItems:''))}</textarea>
    </div>
  `, [
    {label:'저장', cls:'btn-primary', action: async()=>{
      const date = document.getElementById('f-date').value;
      const content = document.getElementById('f-content').value.trim();
      if(!date||!content){alert('날짜와 내용은 필수입니다');return false}
      const obj = {
        id: item?.id||genId(),
        projectId: PROJECT_ID,
        date,
        type: document.getElementById('f-type').value,
        participants: document.getElementById('f-participants').value.trim(),
        content,
        createdAt: item?.createdAt||Date.now(),
      };
      await db.put('communications', obj);
      closeModal();
      renderTab('comm');
    }},
    {label:'취소', cls:'btn-ghost', action:()=>closeModal()},
    ...(id?[{label:'삭제', cls:'btn-danger', action:()=>deleteComm(id)}]:[])
  ]);

async function deleteComm(id){
  if(!confirm('이 커뮤니케이션 기록을 삭제하시겠습니까?')) return;
  await db.delete('communications', id);
  closeModal();
  renderTab('comm');
}

async function renderFiles(){

    <div class="file-upload-zone" id="upload-zone">
      <p>📎 파일을 여기에 드래그하거나 클릭하여 업로드</p>

    <div class="file-category-filter" id="file-cat-filter">
      <button class="filter-btn${fileFilter==='전체'?' active':''}" data-cat="전체">전체</button>
      ${FILE_CATS.map(c=>{const m=FILE_CAT_META[c]||{};return`<button class="filter-btn fcat ${m.cls||'fc-etc'}${fileFilter===c?' active':''}" data-cat="${esc(c)}">${m.icon||''} ${esc(c)}</button>`;}).join('')}
    </div>
    <div id="file-list" class="file-list"></div>
  </div>`;

  const zone = document.getElementById('upload-zone');
  const input = document.getElementById('file-input');
  zone.addEventListener('click',()=>input.click());
  input.addEventListener('change', e=>handleFileUpload(e.target.files));
  zone.addEventListener('dragover', e=>{e.preventDefault();zone.classList.add('drag-over')});
  zone.addEventListener('dragleave',()=>zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e=>{
    e.preventDefault();zone.classList.remove('drag-over');
    handleFileUpload(e.dataTransfer.files);
  });

  document.getElementById('file-search').addEventListener('input', e=>{
    fileSearch = e.target.value;
    loadFiles();
  });

  document.getElementById('file-cat-filter').addEventListener('click', e=>{

    if(!btn) return;
    fileFilter = btn.dataset.cat;
    loadFiles();
  });

  await loadFiles();

  if(!fileList?.length) return;
  showUploadModal(Array.from(fileList));
}

function readFileAsArrayBuffer(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result);
    r.onerror=e=>rej(e);
    r.readAsArrayBuffer(file);
  });
}

async function downloadFile(id){

  if(!f) return;
  const blob = new Blob([f.data], {type:f.mimeType||'application/octet-stream'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=f.name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

// ── MARKDOWN ─────────────────────────────────────────────────────
function inlineFmt(s){
  return s
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>');
}
function renderMarkdown(raw, opts={}){
  if(!raw) return '';
  const lines=raw.split('\n');
  let html='',inUl=false,inOl=false,chkIdx=0;
  const closeList=()=>{
    if(inUl){html+='</ul>';inUl=false;}
    if(inOl){html+='</ol>';inOl=false;}
  };
  const e=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  for(const line of lines){
    if(/^## /.test(line)){closeList();html+=`<h4>${inlineFmt(e(line.slice(3)))}</h4>`;continue;}
    if(/^# /.test(line)){closeList();html+=`<h3>${inlineFmt(e(line.slice(2)))}</h3>`;continue;}
    if(/^---+$/.test(line)){closeList();html+='<hr>';continue;}
    const chk=line.match(/^- \[(x| )\] (.+)/);
    if(chk){
      const done=chk[1]==='x';
      const idx=chkIdx++;
      const clickAttr=opts.checkClick?` data-chk="${idx}" role="checkbox" aria-checked="${done}" tabindex="0"`:'';
      closeList();
      html+=`<div class="md-check${done?' done':''}${opts.checkClick?' clickable':''}"${clickAttr}>${done?'☑':'☐'} ${inlineFmt(e(chk[2]))}</div>`;
      continue;
    }
    const ul=line.match(/^[-*] (.+)/);
    if(ul){if(!inUl){closeList();html+='<ul>';inUl=true;}html+=`<li>${inlineFmt(e(ul[1]))}</li>`;continue;}
    const ol=line.match(/^\d+\. (.+)/);
    if(ol){if(!inOl){closeList();html+='<ol>';inOl=true;}html+=`<li>${inlineFmt(e(ol[1]))}</li>`;continue;}
    closeList();
    if(line.trim()===''){html+='<br>';continue;}
    html+=`<p>${inlineFmt(e(line))}</p>`;
  }
  closeList();
  return html;
}

// ── TOOLBAR INSERT ────────────────────────────────────────────────
function applyFormat(cmd, ta){
  const s=ta.selectionStart, e=ta.selectionEnd;
  const val=ta.value, sel=val.slice(s,e);
  const before=val.slice(0,s), after=val.slice(e);
  const lineStart=before.lastIndexOf('\n')+1;
  const linePrefix=before.slice(lineStart);

  const LINE_CMDS={'h1':'# ','h2':'## ','ul':'- ','ol':'1. ','check':'- [ ] '};
  if(LINE_CMDS[cmd]){
    const prefix=LINE_CMDS[cmd];
    // strip any existing line prefix
    let clean=linePrefix;
    for(const p of Object.values(LINE_CMDS)){if(clean.startsWith(p)){clean=clean.slice(p.length);break;}}
    const removed=linePrefix.length-clean.length;
    if(linePrefix.startsWith(prefix)&&removed===prefix.length){
      // toggle off
      ta.value=val.slice(0,lineStart)+clean+val.slice(lineStart+linePrefix.length);
      ta.setSelectionRange(Math.max(lineStart,s-prefix.length),Math.max(lineStart,e-prefix.length));
    } else {
      ta.value=val.slice(0,lineStart)+prefix+clean+val.slice(lineStart+linePrefix.length);
      ta.setSelectionRange(s-removed+prefix.length,e-removed+prefix.length);
    }
    ta.focus();return;
  }
  if(cmd==='hr'){
    const ins='\n---\n';
    ta.value=before+ins+after;
    ta.setSelectionRange(s+ins.length,s+ins.length);
    ta.focus();return;
  }
  const WRAP={bold:'**',italic:'*',code:'`'};
  if(WRAP[cmd]){
    const w=WRAP[cmd];
    const placeholder={bold:'굵게',italic:'기울임',code:'코드'}[cmd];
    if(sel){
      if(before.endsWith(w)&&after.startsWith(w)){
        ta.value=before.slice(0,-w.length)+sel+after.slice(w.length);
        ta.setSelectionRange(s-w.length,e-w.length);
      } else {
        ta.value=before+w+sel+w+after;
        ta.setSelectionRange(s,e+w.length*2);
      }
    } else {
      ta.value=before+w+placeholder+w+after;
      ta.setSelectionRange(s+w.length,s+w.length+placeholder.length);
    }
    ta.focus();
  }
}

const TB_ITEMS=[

function makeToolbarHtml(targetId){

function attachToolbars(root){
  (root||document).querySelectorAll('.note-toolbar[data-target]').forEach(tb=>{

    if(!ta) return;
    tb.addEventListener('click',e=>{

}

async function loadNotes(){
  let items=await db.getByIndex('notes','projectId',PROJECT_ID);
  items.sort((a,b)=>b.updatedAt-a.updatedAt);
  if(noteSearch){
    const q=noteSearch.toLowerCase();
    items=items.filter(i=>(i.title||'').toLowerCase().includes(q)||(i.content||'').toLowerCase().includes(q));
  }
  const el=document.getElementById('note-list');
  if(!el) return;
  if(!items.length){
    el.innerHTML=`<div class="empty-state"><p>노트가 없습니다</p><span>+ 노트 추가로 첫 메모를 작성해보세요</span></div>`;
    return;
  }
  el.innerHTML=items.map(n=>{
    const rendered=renderMarkdown(n.content||'',{checkClick:true});
    const isLong=(n.content||'').split('\n').length>6||(n.content||'').length>300;
    return `
    <div class="note-card" data-note-id="${n.id}${selectedItem?.id===n.id?' card-selected':''}">
      <div class="note-card-header" data-thread-id="${n.id}" data-thread-type="note">

        </div>

      <div class="note-card-body" id="nb-${n.id}">
        <div class="note-rendered">${rendered}</div>
        ${isLong?'<div class="note-card-fade"></div>':''}
      </div>
      ${isLong?`<button class="note-expand-btn" onclick="toggleNoteExpand('${n.id}')">더 보기 ▾</button>`:''}
    </div>`;
  }).join('');
}

async function toggleNoteCheck(noteId, idx){
  const note=await db.get('notes',noteId);
  if(!note) return;
  let count=0;
  const lines=note.content.split('\n');
  for(let i=0;i<lines.length;i++){
    if(/^- \[(x| )\] /.test(lines[i])){
      if(count===idx){
        lines[i]=lines[i].startsWith('- [x] ')
          ?lines[i].replace('- [x] ','- [ ] ')
          :lines[i].replace('- [ ] ','- [x] ');
        break;
      }
      count++;
    }
  }
  note.content=lines.join('\n');
  note.updatedAt=Date.now();
  await db.put('notes',note);
  await loadNotes();
}

function toggleNoteExpand(id){
  const body=document.getElementById('nb-'+id);
  const btn=body.nextElementSibling;
  body.classList.toggle('expanded');
  btn.textContent=body.classList.contains('expanded')?'접기 ▴':'더 보기 ▾';
}

        updatedAt:Date.now(),
      };
      await db.put('notes',obj);
      closeModal();renderTab('notes');
    }},
    {label:'취소',cls:'btn-ghost',action:()=>closeModal()},
    ...(id?[{label:'삭제',cls:'btn-danger',action:()=>deleteNote(id)}]:[])
  ]);
  setTimeout(()=>attachToolbars(document.getElementById('modal-body')),50);
}

async function deleteNote(id){
  if(!confirm('이 노트를 삭제하시겠습니까?')) return;
  await db.delete('notes',id);
  closeModal();renderTab('notes');
}

// ── TODO TAB ─────────────────────────────────────────────────────
const DAYS_KO = ['일','월','화','수','목','금','토'];

async function renderTodo(){
  const today = new Date();
  if(!todoCal) todoCal = {year:today.getFullYear(), month:today.getMonth()};
  if(!todoSelectedDate) todoSelectedDate = today.toISOString().slice(0,10);

  const el = document.getElementById('tab-content');
  el.innerHTML = `<div class="todo-layout">
    <div class="todo-cal-pane" id="todo-cal-pane" style="${todoView!=='daily'?'display:none':''}"></div>
    <div class="todo-list-pane" id="todo-list-pane">
      <div class="todo-view-toolbar">
        <button class="todo-view-btn${todoView==='daily'?' active':''}" data-view="daily">Daily</button>
        <button class="todo-view-btn${todoView==='weekly'?' active':''}" data-view="weekly">Weekly</button>
        <button class="todo-view-btn${todoView==='monthly'?' active':''}" data-view="monthly">Monthly</button>
      </div>
      <div id="todo-view-body" style="flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column"></div>
    </div>
  </div>`;

  document.querySelector('.todo-view-toolbar').addEventListener('click', async e=>{
    const btn=e.target.closest('.todo-view-btn');
    if(!btn) return;
    todoView=btn.dataset.view;
    await renderTodo();
  });

  if(todoView==='daily'){
    await renderTodoCal();
    await loadTodayTodos();
  } else if(todoView==='weekly'){
    await renderTodoWeeklyBody();
  } else {
    await renderTodoMonthlyBody();
  }
}

async function renderTodoCal(){
  const allTodos = await db.getByIndex('todos','projectId',PROJECT_ID);
  todoDotDates = new Set(allTodos.map(t=>t.date));

  const {year, month} = todoCal;
  const todayStr = new Date().toISOString().slice(0,10);
  const firstDow = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month+1, 0).getDate();
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  let cells = '';
  for(let i=0;i<firstDow;i++) cells += `<div class="cal-day empty"></div>`;
  for(let d=1;d<=lastDate;d++){
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let cls = 'cal-day';
    if(ds===todayStr) cls += ' today';
    if(ds===todoSelectedDate) cls += ' selected';
    cells += `<div class="${cls}" data-cal-date="${ds}">${d}${todoDotDates.has(ds)?'<div class="cal-dot"></div>':''}</div>`;
  }
  const totalCells = firstDow + lastDate;
  for(let i=0;i<(7-totalCells%7)%7;i++) cells += `<div class="cal-day empty"></div>`;

  const pane = document.getElementById('todo-cal-pane');
  if(!pane) return;
  pane.innerHTML = `
    <div class="cal-header">
      <button class="cal-nav" id="cal-prev">‹</button>
      <span class="cal-month-label">${year}년 ${monthNames[month]}</span>
      <button class="cal-nav" id="cal-next">›</button>
    </div>
    <div class="cal-grid">
      ${DAYS_KO.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${cells}
    </div>
  `;

  document.getElementById('cal-prev').addEventListener('click',()=>{
    if(todoCal.month===0) todoCal={year:todoCal.year-1,month:11};
    else todoCal={...todoCal,month:todoCal.month-1};
    renderTodoCal();
  });
  document.getElementById('cal-next').addEventListener('click',()=>{
    if(todoCal.month===11) todoCal={year:todoCal.year+1,month:0};
    else todoCal={...todoCal,month:todoCal.month+1};
    renderTodoCal();
  });
  pane.addEventListener('click',e=>{
    const cell=e.target.closest('[data-cal-date]');
    if(!cell) return;
    todoSelectedDate=cell.dataset.calDate;
    renderTodoCal();
    loadTodayTodos();
  });
}

function todoDateLabel(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  return `${d.getMonth()+1}/${d.getDate()}(${DAYS_KO[d.getDay()]})`;
}

function todoItemHTML(t, extra=''){
  return `<div class="todo-item${t.done?' done-item':''}" data-todo-id="${t.id}">
    <input type="checkbox" class="todo-checkbox" ${t.done?'checked':''} data-chk-id="${t.id}">
    <div class="todo-body">
      <div class="todo-text">${esc(t.content)}</div>
      ${(t.time||t.assignee||t.deadline)?`
      <div class="todo-chips">
        ${t.time?`<span class="todo-chip">⏰ ${esc(t.time)}</span>`:''}
        ${t.assignee?`<span class="todo-chip">👤 ${esc(t.assignee)}</span>`:''}
        ${t.deadline?`<span class="todo-chip">📅 ~${esc(t.deadline)}</span>`:''}
      </div>`:''}
      ${t.memo?`<div class="todo-memo-text">${esc(t.memo)}</div>`:''}
    </div>
    ${extra}
    <div class="todo-item-actions">
      <button data-edit-id="${t.id}" title="수정">✏️</button>
      <button data-del-id="${t.id}" title="삭제">🗑️</button>
    </div>
  </div>`;
}

async function loadTodayTodos(){
  const listPane = document.getElementById('todo-view-body') || document.getElementById('todo-list-pane');
  if(!listPane) return;

  const todayStr = new Date().toISOString().slice(0,10);
  const isToday = todoSelectedDate === todayStr;

  const allTodos = await db.getByIndex('todos','projectId',PROJECT_ID);
  const items = allTodos.filter(t=>t.date===todoSelectedDate).sort((a,b)=>a.createdAt-b.createdAt);

  // 오늘 뷰일 때만 과거 미완료 이월 항목 수집
  const overdue = isToday
    ? allTodos.filter(t=>!t.done && t.date < todayStr).sort((a,b)=>a.date.localeCompare(b.date))
    : [];

  const d = new Date(todoSelectedDate+'T00:00:00');
  const dateLabel = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS_KO[d.getDay()]})`;
  const doneCount = items.filter(t=>t.done).length;

  // 이월 섹션 HTML
  const rolloverHTML = overdue.length ? `
    <div class="todo-rollover-section" id="rollover-section">
      <div class="todo-rollover-header" onclick="document.getElementById('rollover-list').classList.toggle('hidden')">
        <span class="todo-rollover-count">${overdue.length}</span>
        <span class="todo-rollover-header-label">미완료 이월 항목</span>
        <button class="btn-rollover-all" onclick="event.stopPropagation();rolloverAllTodos()">↩ 전체 오늘로</button>
      </div>
      <div class="todo-rollover-list" id="rollover-list">
        ${overdue.map(t=>`
          <div class="todo-rollover-item" data-rollover-id="${t.id}">
            <span class="todo-rollover-from">${todoDateLabel(t.date)}</span>
            <span style="flex:1;font-size:13px;color:var(--text)">${esc(t.content)}</span>
            ${t.time?`<span class="todo-chip" style="font-size:11px">⏰ ${esc(t.time)}</span>`:''}
            <button class="btn-rollover-one" data-rollover-id="${t.id}">↩ 오늘로</button>
          </div>`).join('')}
      </div>
    </div>` : '';

  listPane.innerHTML = `
    <div class="todo-date-header">
      <span class="todo-date-label">${dateLabel}</span>
      <span class="todo-count-badge">${items.length}개 · ${doneCount}개 완료</span>
    </div>
    ${rolloverHTML}
    <div class="todo-add-section">
      <div class="todo-add-main">
        <input type="text" id="todo-input" placeholder="할 일 추가... (Enter)">
        <button class="todo-add-toggle" id="todo-detail-toggle">▾ 상세</button>
        <button class="todo-add-btn" id="btn-todo-add">추가</button>
      </div>
      <div class="todo-detail-fields hidden" id="todo-detail-fields">
        <div><input type="time" id="todo-time" placeholder="시간 (예: 14:00)"></div>
        <div><input type="text" id="todo-assignee" placeholder="담당자"></div>
        <div><input type="date" id="todo-deadline" placeholder="마감일"></div>
        <div class="memo-row"><input type="text" id="todo-memo" placeholder="메모"></div>
      </div>
    </div>
    <div id="todo-list">
      ${items.length===0
        ? `<div class="empty-state"><p>할 일이 없습니다</p><span>위에서 추가해보세요</span></div>`
        : items.map(t=>{
            const extra = t.originalDate
              ? `<span class="todo-rolled-badge" title="${t.originalDate}에서 이월">
                   ${todoDateLabel(t.originalDate)} 이월
                   <button class="btn-restore-one" data-restore-id="${t.id}">되돌리기</button>
                 </span>`
              : '';
            return todoItemHTML(t, extra);
          }).join('')}
    </div>
  `;

  const input = document.getElementById('todo-input');
  const addBtn = document.getElementById('btn-todo-add');
  const detailToggle = document.getElementById('todo-detail-toggle');
  const detailFields = document.getElementById('todo-detail-fields');

  detailToggle.addEventListener('click',()=>{
    const hidden = detailFields.classList.toggle('hidden');
    detailToggle.textContent = hidden ? '▾ 상세' : '▲ 상세';
  });

  const doAdd = async()=>{
    const content = input.value.trim();
    if(!content) return;
    const time = document.getElementById('todo-time')?.value||'';
    const assignee = document.getElementById('todo-assignee')?.value.trim()||'';
    const deadline = document.getElementById('todo-deadline')?.value||'';
    const memo = document.getElementById('todo-memo')?.value.trim()||'';
    await db.put('todos',{
      id:genId(), projectId:PROJECT_ID, date:todoSelectedDate,
      content, time, assignee, deadline, memo, done:false, createdAt:Date.now()
    });
    await refreshTodoView();
  };

  addBtn.addEventListener('click', doAdd);
  input.addEventListener('keydown', e=>{ if(e.key==='Enter'){e.preventDefault();doAdd();} });

  listPane.addEventListener('change', async e=>{
    const id = e.target.dataset.chkId;
    if(!id) return;
    const t = await db.get('todos',id);
    if(!t) return;
    t.done = !t.done;
    await db.put('todos',t);
    await refreshTodoView();
  });

  listPane.addEventListener('click', async e=>{
    const rollBtn = e.target.closest('[data-rollover-id]');
    if(rollBtn){ await rolloverTodo(rollBtn.dataset.rolloverId); return; }
    const restoreBtn = e.target.closest('[data-restore-id]');
    if(restoreBtn){ await restoreTodo(restoreBtn.dataset.restoreId); return; }
    const editBtn = e.target.closest('[data-edit-id]');
    if(editBtn){ await editTodoModal(editBtn.dataset.editId); return; }
    const delBtn = e.target.closest('[data-del-id]');
    if(delBtn){ await deleteTodo(delBtn.dataset.delId); return; }
  });
}

async function rolloverTodo(id){
  const t = await db.get('todos', id);
  if(!t) return;
  t.originalDate = t.date;
  t.date = new Date().toISOString().slice(0,10);
  await db.put('todos', t);
  await refreshTodoView();
}

async function rolloverAllTodos(){
  const todayStr = new Date().toISOString().slice(0,10);
  const all = await db.getByIndex('todos','projectId',PROJECT_ID);
  const overdue = all.filter(t=>!t.done && t.date < todayStr);
  await Promise.all(overdue.map(t=>{
    t.originalDate = t.originalDate || t.date;
    t.date = todayStr;
    return db.put('todos',t);
  }));
  showToast(`↩ ${overdue.length}개 오늘로 이월했습니다`);
  await refreshTodoView();
}

async function restoreTodo(id){
  const t = await db.get('todos', id);
  if(!t?.originalDate) return;
  t.date = t.originalDate;
  delete t.originalDate;
  await db.put('todos', t);
  await refreshTodoView();
}

async function deleteTodo(id){
