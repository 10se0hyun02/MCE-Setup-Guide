async function importData(file){
  if(!file) return;
  if(!confirm('현재 데이터(파일 제외)를 가져오기 데이터로 덮어씁니까?\n파일 첨부는 별도로 다시 업로드해야 합니다.')) return;
  try{
    const text=await file.text();
    const data=JSON.parse(text);
    if(data.project) await db.put('projects',data.project);
    for(const c of(data.communications||[])) await db.put('communications',c);
    for(const i of(data.issues||[])) await db.put('issues',i);
    for(const n of(data.notes||[])) await db.put('notes',n);
    for(const t of(data.todos||[])) await db.put('todos',t);
    for(const t of(data.threads||[])) await db.put('threads',t);
    project=await db.get('projects',PROJECT_ID);
    renderHeader();
    renderTab(currentTab);
    alert('가져오기 완료');
  }catch(e){
    alert('파일을 읽는 중 오류가 발생했습니다: '+e.message);
  }
}

// ── GLOBAL SEARCH ────────────────────────────────────────────────
let gsearchFocusIdx = -1;

function openGlobalSearch(){
  document.getElementById('gsearch-overlay').classList.remove('hidden');
  const inp = document.getElementById('gsearch-input');
  inp.value = '';
  inp.focus();
  gsearchFocusIdx = -1;
  document.getElementById('gsearch-results').innerHTML = '<div class="gsearch-empty">검색어를 입력하세요</div>';
}

function closeGlobalSearch(){
  document.getElementById('gsearch-overlay').classList.add('hidden');
}

function gsHighlight(text, query){
  if(!text) return '';
  if(!query) return esc(text);
  const idx = String(text).toLowerCase().indexOf(query.toLowerCase());
  if(idx < 0) return esc(text);
  const t = String(text);
  return esc(t.slice(0,idx))
    + `<span class="gsearch-highlight">${esc(t.slice(idx, idx+query.length))}</span>`
    + esc(t.slice(idx+query.length));
}

async function runGlobalSearch(query){
  const q = query.toLowerCase().trim();
  if(!q) return [];
  const results = [];

  const comms = await db.getByIndex('communications','projectId',PROJECT_ID);
  comms.forEach(c=>{
    const fields = [c.content, c.participants, c.type, c.date];
    if(fields.some(f=>(f||'').toLowerCase().includes(q))){
      const matchIn = (c.participants||'').toLowerCase().includes(q) ? '참석자 일치'
        : (c.date||'').includes(q) ? '날짜 일치' : '내용 일치';
      results.push({
        tab:'comm', threadType:'comm', icon:'💬', section:'커뮤니케이션',
        title:`${c.date} · ${c.type}`,
        meta:`${c.participants||''}  ·  ${matchIn}`,
        preview:(c.content||'').replace(/\n/g,' ').slice(0,80),
        id:c.id,
      });
    }
  });

  const files = await db.getByIndex('files','projectId',PROJECT_ID);
  files.forEach(f=>{
    if((f.name||'').toLowerCase().includes(q)||(f.category||'').toLowerCase().includes(q)){
      results.push({
        tab:'files', icon:'📎', section:'파일',
        title:f.name,
        meta:`${f.category} · ${fmtSize(f.size)}`,
        id:f.id,
      });
    }
  });

  const issues = await db.getByIndex('issues','projectId',PROJECT_ID);
  issues.forEach(i=>{
    const fields = [i.title, i.content, i.assignee, i.category];
    if(fields.some(f=>(f||'').toLowerCase().includes(q))){
      const pl={high:'🔴 높음',medium:'🟡 보통',low:'🟢 낮음'};
      const matchIn = (i.title||'').toLowerCase().includes(q) ? '제목 일치'
        : (i.assignee||'').toLowerCase().includes(q) ? '담당자 일치' : '내용 일치';
      results.push({
        tab:'issues', threadType:'issue', icon:'⚠️', section:'이슈',
        title:i.title,
        meta:`${pl[i.priority]||''} · ${i.category} · ${matchIn}`,
        preview:(i.content||'').replace(/\n/g,' ').slice(0,80),
        id:i.id,
      });
    }
  });

  const notes = await db.getByIndex('notes','projectId',PROJECT_ID);
  notes.forEach(n=>{
    if((n.title||'').toLowerCase().includes(q)||(n.content||'').toLowerCase().includes(q)){
      const matchIn = (n.title||'').toLowerCase().includes(q) ? '제목 일치' : '내용 일치';
      results.push({
        tab:'notes', threadType:'note', icon:'📝', section:'노트',
        title:n.title||'(제목 없음)',
        meta:`${new Date(n.updatedAt).toLocaleDateString('ko-KR')} · ${matchIn}`,
        preview:(n.content||'').replace(/\n/g,' ').slice(0,80),
        id:n.id,
      });
    }
  });

  const todos = await db.getByIndex('todos','projectId',PROJECT_ID);
  todos.forEach(t=>{
    if([t.content,t.memo,t.assignee].some(f=>(f||'').toLowerCase().includes(q))){
      results.push({
        tab:'todo', icon:'📅', section:'할일',
        title:t.content,
        meta:`${t.date}${t.done?' · ✅ 완료':''}${t.assignee?' · '+t.assignee:''}`,
        id:t.id,
        date:t.date,
      });
    }
  });

  return results;
}

async function renderGsearchResults(query){
  const el = document.getElementById('gsearch-results');
  if(!el) return;
  gsearchFocusIdx = -1;

  if(!query.trim()){
    el.innerHTML = '<div class="gsearch-empty">검색어를 입력하세요</div>';
    return;
  }

  const results = await runGlobalSearch(query);

  if(!results.length){
    el.innerHTML = `<div class="gsearch-empty">"${esc(query)}" 검색 결과가 없습니다</div>`;
    return;
  }

  const sections = {};
  results.forEach(r=>{
    if(!sections[r.section]) sections[r.section]=[];
    sections[r.section].push(r);
  });

  let html = '';
  const sectionOrder = ['커뮤니케이션','파일','이슈','노트','할일'];
  sectionOrder.forEach(sec=>{
    const items = sections[sec];
    if(!items) return;
    html += `<div class="gsearch-section-label">${esc(sec)} <span style="font-weight:400;letter-spacing:0">(${items.length})</span></div>`;
    items.forEach(r=>{
      const titleHtml = gsHighlight(r.title, query);
      const previewText = r.preview ? r.preview : '';
      const previewHtml = previewText ? gsHighlight(previewText, query) : '';
      const metaStr = r.meta || '';
      html += `
        <div class="gsearch-item" data-gtab="${esc(r.tab)}" data-gid="${esc(r.id)}" data-gtype="${esc(r.threadType||'')}" data-gdate="${esc(r.date||'')}">
          <span class="gsearch-item-icon">${r.icon}</span>
          <div class="gsearch-item-body">
            <div class="gsearch-item-title">${titleHtml}</div>
            <div class="gsearch-item-meta">${esc(metaStr)}${previewHtml?' — '+previewHtml:''}</div>
          </div>
          <span class="gsearch-item-badge">${esc(sec)}</span>
        </div>`;
    });
  });

  el.innerHTML = html;
}

function gsearchGo(item){
  const tab = item.dataset.gtab;
  const id = item.dataset.gid;
  const type = item.dataset.gtype;
  const date = item.dataset.gdate;
  closeGlobalSearch();
  renderTab(tab);
  if(type && ['comm','issue','note'].includes(type)){
    setTimeout(()=>openThread(id, type), 150);
  } else if(tab==='todo' && date){
    todoSelectedDate = date;
    todoView = 'daily';
    setTimeout(()=>renderTodo(), 50);
  }
}

// ── EVENT LISTENERS ───────────────────────────────────────────────
document.getElementById('tab-nav').addEventListener('click', e=>{
  const btn=e.target.closest('button');
  if(!btn) return;
  if(btn.dataset.tab) renderTab(btn.dataset.tab);
  else if(btn.dataset.tabGroup==='workspace') renderTab(currentSubTab);
  else if(btn.dataset.tabGroup==='steps') renderTab(currentStepsSubTab);
});
document.getElementById('sub-tab-nav').addEventListener('click', e=>{
  const btn=e.target.closest('button');
  if(btn&&btn.dataset.tab) renderTab(btn.dataset.tab);
});
document.getElementById('steps-sub-nav').addEventListener('click', e=>{
  const btn=e.target.closest('button');
  if(btn&&btn.dataset.tab) renderTab(btn.dataset.tab);
});
document.getElementById('btn-edit-proj').addEventListener('click',()=>showProjectModal(false));
document.getElementById('btn-agent-settings').addEventListener('click',openAgentSettings);
document.getElementById('btn-export').addEventListener('click',exportData);
document.getElementById('btn-import').addEventListener('click',()=>document.getElementById('import-input').click());
document.getElementById('import-input').addEventListener('change',e=>{
  importData(e.target.files[0]);
  e.target.value='';
});
document.getElementById('modal-overlay').addEventListener('click', e=>{
  if(e.target===document.getElementById('modal-overlay')&&e.target.dataset.preventClose!=='1') closeModal();
});
document.getElementById('modal-close').addEventListener('click', closeModal);

// global search
document.getElementById('btn-global-search').addEventListener('click', openGlobalSearch);
document.getElementById('gsearch-close-kbd').addEventListener('click', closeGlobalSearch);
document.getElementById('gsearch-overlay').addEventListener('click', e=>{
  if(e.target===document.getElementById('gsearch-overlay')) closeGlobalSearch();
});
document.getElementById('gsearch-input').addEventListener('input', e=>{
  renderGsearchResults(e.target.value);
});
document.getElementById('gsearch-input').addEventListener('keydown', e=>{
  const items = document.querySelectorAll('.gsearch-item');
  if(e.key==='ArrowDown'){
    e.preventDefault();
    gsearchFocusIdx = Math.min(gsearchFocusIdx+1, items.length-1);
    items.forEach((el,i)=>el.classList.toggle('focused',i===gsearchFocusIdx));
    if(items[gsearchFocusIdx]) items[gsearchFocusIdx].scrollIntoView({block:'nearest'});
  } else if(e.key==='ArrowUp'){
    e.preventDefault();
    gsearchFocusIdx = Math.max(gsearchFocusIdx-1, 0);
    items.forEach((el,i)=>el.classList.toggle('focused',i===gsearchFocusIdx));
    if(items[gsearchFocusIdx]) items[gsearchFocusIdx].scrollIntoView({block:'nearest'});
  } else if(e.key==='Enter'){
    const focused = items[gsearchFocusIdx];
    if(focused) gsearchGo(focused);
  } else if(e.key==='Escape'){
    closeGlobalSearch();
  }
});
document.getElementById('gsearch-results').addEventListener('click', e=>{
  const item = e.target.closest('.gsearch-item');
  if(item) gsearchGo(item);
});
document.addEventListener('keydown', e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){
    e.preventDefault();
    openGlobalSearch();
  }
});
document.addEventListener('keydown', e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){
    const tag = document.activeElement?.tagName;
    const editable = tag==='INPUT'||tag==='TEXTAREA'||document.activeElement?.isContentEditable;
    if(editable) return;
    e.preventDefault();
    undoLast();
  }
});

// ── THEME ─────────────────────────────────────────────────────────
function applyTheme(theme){
  document.documentElement.dataset.theme = theme;
  document.getElementById('btn-theme').dataset.theme = theme;
}
function getSystemTheme(){
  return window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
}
(function initTheme(){
  const saved = localStorage.getItem('mce-theme');
  applyTheme(saved || getSystemTheme());
})();
document.getElementById('btn-theme').addEventListener('click',()=>{
  const next = document.documentElement.dataset.theme==='dark' ? 'light' : 'dark';
  applyTheme(next);
  localStorage.setItem('mce-theme', next);
});

// ── START ────────────────────────────────────────────────────────
init();
</script>

</html>
